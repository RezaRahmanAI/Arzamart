<div class="site-container-admin mx-auto flex flex-col gap-ds-10">
  <!-- Page Header -->
  <div class="flex flex-col md:flex-row md:items-start justify-between gap-ds-6">
    <div>
      <h1 class="text-ds-text">Pages</h1>
      <p class="text-ds-text-muted mt-1.5">
        Manage static pages (Privacy, Terms, etc.)
      </p>
    </div>
    <button
      (click)="openAddModal()"
      class="btn btn-primary h-11 px-ds-8"
     *ngIf="authService.currentUserSnapshot()?.role !== 'Staff'">
      <app-icon name="Plus" size="14"></app-icon>
      <span>Add Page</span>
    </button>
  </div>

  <!-- Content Table -->
  <div class="bg-ds-surface border border-ds-border rounded-sm shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-ds-bg/50 border-b border-ds-border">
            <th class="px-ds-8 py-ds-5 text-ds-text-muted">Title</th>
            <th class="px-ds-8 py-ds-5 text-ds-text-muted">Slug</th>
            <th class="px-ds-8 py-ds-5 text-ds-text-muted">Status</th>
            <th class="px-ds-8 py-ds-5 text-ds-text-muted text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-ds-border/50">
          <tr
            *ngFor="let page of pages"
            class="hover:bg-ds-bg/50 transition-colors group"
          >
            <td class="px-ds-8 py-ds-5">
              <span class="text-ds-text">{{ page.title }}</span>
            </td>
            <td class="px-ds-8 py-ds-5">
              <span class="text-ds-text-muted">/{{ page.slug }}</span>
            </td>
            <td class="px-ds-8 py-ds-5">
              <span
                class="px-ds-3 py-1 rounded-sm border transition-all"
                [ngClass]="page.isActive ? 'bg-ds-success/10 text-ds-success border-ds-success/20' : 'bg-ds-bg text-ds-text-muted border-ds-border'"
              >
                {{ page.isActive ? "Active" : "Inactive" }}
              </span>
            </td>
            <td class="px-ds-8 py-ds-5 text-right">
              <div class="flex justify-end gap-ds-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                <button
                  (click)="openEditModal(page)"
                  class="size-8 flex items-center justify-center rounded-sm border border-ds-border text-ds-text-muted hover:text-ds-text hover:border-ds-text transition-colors"
                  title="Edit"
                >
                  <app-icon name="Edit3" size="14"></app-icon>
                </button>
                <button
                  *ngIf="authService.isSuperAdmin()"
                  (click)="deletePage(page.id)"
                  class="size-8 flex items-center justify-center rounded-sm border border-ds-border text-ds-text-muted hover:text-red-500 hover:border-red-500 transition-colors"
                  title="Delete"
                >
                  <app-icon name="Trash2" size="14"></app-icon>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Empty State -->
    <div *ngIf="pages.length === 0" class="py-ds-32 text-center">
      <app-icon name="FileText" size="64" className="mx-auto mb-ds-6 text-ds-text-muted opacity-10"></app-icon>
      <h3 class="text-ds-text-muted">No pages found</h3>
      <p class="text-ds-text-muted/60 mt-2">
        No pages added yet.
      </p>
    </div>
  </div>
</div>

<!-- Modal -->
<div *ngIf="isModalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-ds-4 bg-ds-text/60 backdrop-blur-md animate-in fade-in duration-300">
  <div class="bg-ds-surface border border-ds-border rounded-sm w-full max-w-4xl max-h-[90vh] shadow-2xl relative overflow-hidden flex flex-col animate-in zoom-in duration-base">
    <div class="px-ds-8 py-ds-6 border-b border-ds-border bg-ds-bg/50 flex items-center justify-between">
      <div>
        <h2 class="text-ds-text">
          {{ isEditing ? 'Edit Page' : 'Add Page' }}
        </h2>
        <p class="text-ds-text-muted mt-0.5">Page settings</p>
      </div>
      <button (click)="closeModal()" class="size-10 flex items-center justify-center hover:bg-ds-text/10 transition-colors rounded-sm text-ds-text-muted hover:text-ds-text">
        <app-icon name="X" size="20"></app-icon>
      </button>
    </div>

    <form [formGroup]="pageForm" (ngSubmit)="onSubmit()" class="flex-1 overflow-y-auto p-ds-8 flex flex-col gap-ds-10">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-ds-8">
        <!-- Title -->
        <div class="space-y-2">
          <label class="block text-ds-text-muted ml-1 mb-1.5">Page Title</label>
          <input
            type="text"
            formControlName="title"
            placeholder="E.G. PRIVACY ARCHIVE"
            class="form-input !h-11 !px-ds-4"
          />
        </div>

        <!-- Slug -->
        <div class="space-y-2">
          <label class="block text-ds-text-muted ml-1 mb-1.5">URL Slug</label>
          <div class="flex items-center">
            <span class="h-11 px-ds-4 bg-ds-bg border border-r-0 border-ds-border rounded-l-sm text-ds-text-muted flex items-center">/</span>
            <input
              type="text"
              formControlName="slug"
              placeholder="privacy-policy"
              class="form-input !h-11 !rounded-l-none"
            />
          </div>
        </div>

        <!-- Content Editor -->
        <div class="col-span-2 space-y-2">
          <label class="block text-ds-text-muted ml-1 mb-1.5">Content (HTML supported)</label>
          <textarea
            formControlName="content"
            rows="12"
            class="form-input !py-ds-4 !px-ds-5 min-h-[300px]"
            placeholder="ENCODE DOCUMENTATION MARKUP HERE..."
          ></textarea>
        </div>

        <!-- SEO Matrix -->
        <div class="col-span-2 bg-ds-bg/30 border border-ds-border p-ds-8 rounded-sm space-y-ds-6">
          <h3 class="text-ds-text pb-ds-3 border-b border-ds-border">SEO Settings</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-ds-6">
            <div class="space-y-2">
              <label class="block text-ds-text-muted ml-1">SEO Title</label>
              <input
                type="text"
                formControlName="metaTitle"
                class="form-input !h-10 !px-ds-4"
              />
            </div>
            <div class="space-y-2">
              <label class="block text-ds-text-muted ml-1">SEO Description</label>
              <input
                type="text"
                formControlName="metaDescription"
                class="form-input !h-10 !px-ds-4"
              />
            </div>
          </div>
        </div>

        <!-- Publication Toggle -->
        <div class="col-span-2 flex items-center gap-ds-4 py-ds-2">
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" formControlName="isActive" class="sr-only peer" />
            <div class="w-11 h-6 bg-ds-border peer-focus:outline-none rounded-sm peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-ds-surface after:border-ds-border after:border after:rounded-sm after:h-5 after:w-5 after:transition-all peer-checked:bg-ds-text"></div>
          </label>
          <span class="text-ds-text">Published</span>
        </div>
      </div>

      <!-- Footer Actions -->
      <div class="flex justify-end gap-ds-4 pt-ds-8 border-t border-ds-border bg-ds-surface sticky bottom-0 mt-auto">
        <button
          type="button"
          (click)="closeModal()"
          class="btn btn-secondary h-12 px-ds-10"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="isSubmitting"
          class="btn btn-primary h-12 px-ds-12 flex items-center gap-ds-3 !bg-ds-text !text-ds-surface"
        >
          <app-icon *ngIf="isSubmitting" name="Loader2" size="18" className="animate-spin"></app-icon>
          <span>{{ isSubmitting ? 'Syncing' : (isEditing ? 'Save Changes' : 'Create Page') }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
