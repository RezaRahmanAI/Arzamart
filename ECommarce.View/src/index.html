<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="utf-8" />
    <title>Arza Mart</title>
    <meta
      name="description"
      content="Arza Mart — Premium fashion and lifestyle e-commerce. Shop the latest trends in clothing, accessories, and more."
    />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Preconnect for faster font & API loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.arzamart.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.arzamart.com" />

    <!-- Google Fonts: DM Sans (primary) + Hind Siliguri (Bengali support) -->
    <!-- Preload hero weight first for fastest LCP -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&display=swap"
      as="style"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Hind+Siliguri:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Hind+Siliguri:wght@400;500;600;700&display=swap" />
    </noscript>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
