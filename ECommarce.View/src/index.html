<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="utf-8" />
    <title>Arza Mart</title>
    <meta
      name="description"
      content="Arza Mart — Premium fashion and lifestyle e-commerce. Shop the latest trends in clothing, accessories, and more."
    />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Preconnect for faster font & API loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Google Fonts: Only loading used fonts (Plus Jakarta Sans and Hind Siliguri for Bengali) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
  </head>
