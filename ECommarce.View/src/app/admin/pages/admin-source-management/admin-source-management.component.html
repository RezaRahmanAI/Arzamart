<div class="site-container-admin mx-auto flex flex-col gap-ds-8">
  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-start justify-between gap-ds-6">
    <div>
      <h1 class="text-ds-text">Order Sources</h1>
      <p class="text-ds-text-muted mt-1.5">
        Manage order source pages and social media
      </p>
    </div>
    <button
      (click)="openAddModal()"
      class="btn btn-primary h-11 px-ds-8"
     *ngIf="authService.currentUserSnapshot()?.role !== 'Staff'">
      <app-icon name="Plus" size="14"></app-icon>
      <span>Add {{ activeTab === 'pages' ? 'Page' : 'Social Source' }}</span>
    </button>
  </div>

  <!-- Tabs & Controls -->
  <div class="flex flex-col sm:flex-row items-center justify-between gap-ds-6">
    <div class="flex p-1 bg-ds-bg border border-ds-border rounded-sm w-fit">
      <button
        (click)="switchTab('pages')"
        [class.bg-ds-surface]="activeTab === 'pages'"
        [class.text-ds-text]="activeTab === 'pages'"
        [class.border-ds-border]="activeTab === 'pages'"
        [class.shadow-sm]="activeTab === 'pages'"
        class="flex items-center gap-ds-3 px-ds-6 py-2 rounded-sm border border-transparent transition-all"
        [class.text-ds-text-muted]="activeTab !== 'pages'"
      >
        <app-icon name="Globe" size="14"></app-icon>
        Pages
      </button>
      <button
        (click)="switchTab('social')"
        [class.bg-ds-surface]="activeTab === 'social'"
        [class.text-ds-text]="activeTab === 'social'"
        [class.border-ds-border]="activeTab === 'social'"
        [class.shadow-sm]="activeTab === 'social'"
        class="flex items-center gap-ds-3 px-ds-6 py-2 rounded-sm border border-transparent transition-all"
        [class.text-ds-text-muted]="activeTab !== 'social'"
      >
        <app-icon name="Share2" size="14"></app-icon>
        Social
      </button>
    </div>
  </div>

  <!-- Content Table -->
  <div class="bg-ds-surface rounded-sm border border-ds-border overflow-hidden shadow-sm">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-ds-bg/50 border-b border-ds-border">
            <th class="px-ds-6 py-ds-4 text-ds-text-muted">Name</th>
            <th class="px-ds-6 py-ds-4 text-ds-text-muted">Status</th>
            <th class="px-ds-6 py-ds-4 text-ds-text-muted text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-ds-border/50">
          <ng-container *ngIf="!isLoading; else loading">
            <tr *ngFor="let item of (activeTab === 'pages' ? sourcePages : socialMediaSources)" class="hover:bg-ds-bg transition-colors group">
              <td class="px-ds-6 py-ds-4">
                <div class="flex items-center gap-3">
                  <app-icon [name]="activeTab === 'pages' ? 'Globe' : 'Share2'" size="14" className="text-ds-text-muted"></app-icon>
                  <span class="text-ds-text">{{ item.name }}</span>
                </div>
              </td>
              <td class="px-ds-6 py-ds-4">
                <span
                  class="px-ds-3 py-1 rounded-sm border"
                  [ngClass]="item.isActive ? 'bg-ds-success/10 text-ds-success border-ds-success/20' : 'bg-ds-bg text-ds-text-muted border-ds-border'"
                >
                  {{ item.isActive ? 'Active' : 'Inactive' }}
                </span>
              </td>
              <td class="px-ds-6 py-ds-4 text-right">
                <div class="flex items-center justify-end gap-ds-2">
                  <button
                    (click)="openEditModal(item)"
                    class="size-8 flex items-center justify-center rounded-sm border border-ds-border text-ds-text-muted hover:text-ds-text hover:border-ds-text transition-colors"
                    title="Edit"
                  >
                    <app-icon name="Edit3" size="14"></app-icon>
                  </button>
                  <button
                    *ngIf="authService.isSuperAdmin()"
                    (click)="deleteItem(item.id)"
                    class="size-8 flex items-center justify-center rounded-sm border border-ds-border text-ds-text-muted hover:text-red-500 hover:border-red-500 transition-colors"
                    title="Delete"
                  >
                    <app-icon name="Trash2" size="14"></app-icon>
                  </button>
                </div>
              </td>
            </tr>
            <tr *ngIf="(activeTab === 'pages' ? sourcePages : socialMediaSources).length === 0">
              <td colspan="3" class="px-ds-6 py-ds-24 text-center">
                <div class="flex flex-col items-center gap-ds-4">
                  <app-icon [name]="activeTab === 'pages' ? 'Globe' : 'Share2'" size="48" className="text-ds-text-muted opacity-10"></app-icon>
                  <p class="text-ds-text-muted">{{ activeTab === 'pages' ? 'No pages found' : 'No social sources found' }}</p>
                </div>
              </td>
            </tr>
          </ng-container>
          <ng-template #loading>
            <tr>
              <td colspan="3" class="px-ds-6 py-ds-24 text-center">
                <app-icon name="Loader2" size="32" className="animate-spin text-ds-text-muted mx-auto"></app-icon>
                <p class="text-ds-text-muted mt-ds-4 animate-pulse">Loading...</p>
              </td>
            </tr>
          </ng-template>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div *ngIf="isModalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-ds-bg/80 backdrop-blur-md animate-in fade-in duration-300">
  <div class="bg-ds-surface rounded-sm border border-ds-border w-full max-w-md shadow-2xl relative overflow-hidden animate-in zoom-in duration-base">
    <div class="px-ds-8 py-ds-4 border-b border-ds-border flex items-center justify-between bg-ds-bg/50">
      <div>
        <h2 class="text-ds-text">
          {{ isEditing ? 'Edit' : 'Add' }}
        </h2>
        <p class="text-ds-text-muted mt-0.5">Source settings</p>
      </div>
      <button (click)="closeModal()" class="size-10 flex items-center justify-center hover:bg-ds-text/10 transition-colors rounded-sm text-ds-text-muted hover:text-ds-text">
        <app-icon name="X" size="18"></app-icon>
      </button>
    </div>

    <form [formGroup]="sourceForm" (ngSubmit)="onSubmit()" class="p-ds-8 flex flex-col gap-ds-6">
      <!-- Name -->
      <div class="space-y-2">
        <label class="block text-ds-text ml-1 mb-1.5">Source Name</label>
        <input
          type="text"
          formControlName="name"
          placeholder="E.G. FACEBOOK CORPORATE"
          class="form-input !h-11 !px-ds-4"
        />
      </div>

      <!-- Active Toggle -->
      <div class="flex items-center gap-ds-3 pt-ds-2">
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" formControlName="isActive" class="sr-only peer" />
          <div class="w-11 h-6 bg-ds-border peer-focus:outline-none rounded-sm peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-ds-surface after:border-ds-border after:border after:rounded-sm after:h-5 after:w-5 after:transition-all peer-checked:bg-ds-text"></div>
        </label>
        <span class="text-ds-text">Active</span>
      </div>

      <!-- Submit -->
      <div class="flex gap-ds-4 mt-ds-4">
        <button
          type="button"
          (click)="closeModal()"
          class="btn btn-secondary flex-1 !h-12"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="isSubmitting"
          class="btn btn-primary flex-[2] !h-12 !bg-ds-text !text-ds-surface flex items-center justify-center gap-ds-2"
        >
          <app-icon *ngIf="isSubmitting" name="Loader2" size="16" className="animate-spin"></app-icon>
          <span>{{ isSubmitting ? 'Syncing' : (isEditing ? 'Save' : 'Add') }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
