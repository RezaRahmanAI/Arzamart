<div class="p-3 max-w-7xl mx-auto animate-in fade-in duration-500">
  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
    <div>
      <h1 class="text-xl font-black text-primary uppercase tracking-tight">Order Sources</h1>
      <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest opacity-70">Manage manual order origins</p>
    </div>
    <button
      (click)="openAddModal()"
      class="arza-btn-primary h-9 px-4 rounded-xl text-[11px] font-black uppercase tracking-widest flex items-center justify-center gap-2"
    >
      <app-icon name="Plus" size="14"></app-icon>
      Add {{ activeTab === 'pages' ? 'Page' : 'Social' }}
    </button>
  </div>

  <!-- Tabs -->
  <div class="flex items-center gap-1 p-1 bg-gray-50 dark:bg-surface-alt rounded-xl w-fit mb-4 border border-gray-100">
    <button
      (click)="switchTab('pages')"
      [class.bg-white]="activeTab === 'pages'"
      [class.text-primary]="activeTab === 'pages'"
      [class.shadow-sm]="activeTab === 'pages'"
      class="flex items-center gap-2 px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all"
    >
      <app-icon name="Globe" size="14"></app-icon>
      Pages
    </button>
    <button
      (click)="switchTab('social')"
      [class.bg-white]="activeTab === 'social'"
      [class.text-primary]="activeTab === 'social'"
      [class.shadow-sm]="activeTab === 'social'"
      class="flex items-center gap-2 px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all"
    >
      <app-icon name="Share2" size="14"></app-icon>
      Social
    </button>
  </div>

  <!-- Content Table -->
  <div class="bg-white dark:bg-surface-dark rounded-2xl border border-gray-100 overflow-hidden shadow-sm">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100">
            <th class="px-3 py-2 text-[9px] font-black text-gray-400 uppercase tracking-widest">Name</th>
            <th class="px-3 py-2 text-[9px] font-black text-gray-400 uppercase tracking-widest">Status</th>
            <th class="px-3 py-2 text-[9px] font-black text-gray-400 uppercase tracking-widest text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <ng-container *ngIf="!isLoading; else loading">
            <tr *ngFor="let item of (activeTab === 'pages' ? sourcePages : socialMediaSources)" class="hover:bg-gray-50 transition-colors">
              <td class="px-3 py-2">
                <span class="text-[11px] font-black text-primary">{{ item.name }}</span>
              </td>
              <td class="px-3 py-2">
                <span
                  [class.bg-emerald-50]="item.isActive"
                  [class.text-emerald-600]="item.isActive"
                  [class.bg-red-50]="!item.isActive"
                  [class.text-red-600]="!item.isActive"
                  class="px-2 py-0.5 rounded-lg text-[9px] font-black uppercase tracking-widest inline-flex items-center gap-1 border border-transparent"
                  [class.border-emerald-100]="item.isActive"
                  [class.border-red-100]="!item.isActive"
                >
                  {{ item.isActive ? 'Active' : 'Inactive' }}
                </span>
              </td>
              <td class="px-3 py-2 text-right">
                <div class="flex items-center justify-end gap-1">
                  <button
                    (click)="openEditModal(item)"
                    class="size-7 flex items-center justify-center text-slate-400 hover:text-primary hover:bg-primary/5 rounded-lg transition-all"
                    title="Edit"
                  >
                    <app-icon name="Edit" size="14"></app-icon>
                  </button>
                  <button
                    *ngIf="authService.isSuperAdmin()"
                    (click)="deleteItem(item.id)"
                    class="size-7 flex items-center justify-center text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all"
                    title="Delete"
                  >
                    <app-icon name="Trash2" size="14"></app-icon>
                  </button>
                </div>
              </td>
            </tr>
            <tr *ngIf="(activeTab === 'pages' ? sourcePages : socialMediaSources).length === 0">
              <td colspan="3" class="px-6 py-8 text-center">
                <div class="flex flex-col items-center gap-1">
                  <app-icon [name]="activeTab === 'pages' ? 'Globe' : 'Share2'" size="32" className="text-border"></app-icon>
                  <p class="text-[10px] text-text-sub">No {{ activeTab === 'pages' ? 'page' : 'social media' }} sources found.</p>
                </div>
              </td>
            </tr>
          </ng-container>
          <ng-template #loading>
            <tr>
              <td colspan="3" class="px-6 py-12 text-center">
                <app-icon name="Loader2" size="32" className="animate-spin text-primary mx-auto"></app-icon>
                <p class="text-text-sub mt-2">Loading data...</p>
              </td>
            </tr>
          </ng-template>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div *ngIf="isModalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="fixed inset-0 bg-black/40 backdrop-blur-sm" (click)="closeModal()"></div>
  <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl relative overflow-hidden">
    <div class="px-4 py-3 border-b border-gray-50 flex items-center justify-between bg-gray-50">
      <h2 class="text-sm font-black text-primary uppercase tracking-tight">
        {{ isEditing ? 'Edit' : 'Add' }} Source
      </h2>
      <button (click)="closeModal()" class="size-7 hover:bg-gray-200 rounded-lg flex items-center justify-center transition-all">
        <app-icon name="X" size="14" className="text-gray-400"></app-icon>
      </button>
    </div>

    <form [formGroup]="sourceForm" (ngSubmit)="onSubmit()" class="p-4 space-y-4">
      <!-- Name -->
      <div class="space-y-1.5">
        <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Source Name</label>
        <input
          type="text"
          formControlName="name"
          placeholder="e.g. Facebook Page"
          class="w-full h-9 px-3 rounded-xl border border-gray-100 bg-gray-50/50 text-xs font-bold text-primary focus:ring-1 focus:ring-primary outline-none"
        />
      </div>

      <!-- Active Toggle -->
      <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100">
        <div>
          <p class="text-[10px] font-black text-primary uppercase tracking-tight">Active</p>
          <p class="text-[8px] font-bold text-gray-400 uppercase tracking-widest">Enable origin</p>
        </div>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" formControlName="isActive" class="sr-only peer" />
          <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
        </label>
      </div>

      <!-- Submit -->
      <div class="flex gap-2 pt-2">
        <button
          type="button"
          (click)="closeModal()"
          class="flex-1 h-9 rounded-xl text-[10px] font-black uppercase tracking-widest text-gray-400 hover:bg-gray-50 transition-all"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="isSubmitting"
          class="flex-1 h-9 bg-primary text-white text-[10px] font-black uppercase tracking-widest rounded-xl transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2"
        >
          <app-icon *ngIf="isSubmitting" name="Loader2" size="14" className="animate-spin"></app-icon>
          {{ isSubmitting ? 'Saving' : (isEditing ? 'Update' : 'Create') }}
        </button>
      </div>
    </form>
  </div>
</div>
