<div class="flex-1 overflow-y-auto p-3 space-y-4 scroll-smooth">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h2
        class="text-primary dark:text-white text-xl font-black uppercase tracking-tight"
      >
        IP Blocking
      </h2>
      <p class="text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest opacity-70">
        Malicious access prevention
      </p>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-3">
    <!-- Block Form -->
    <div class="lg:col-span-1">
      <div
        class="bg-white dark:bg-surface-dark p-3 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm"
      >
        <h3
          class="text-xs font-black text-primary dark:text-white mb-4 uppercase tracking-tight flex items-center gap-2"
        >
          <app-icon
            name="Ban"
            size="16"
            className="text-red-500"
          ></app-icon>
          Block IP
        </h3>
        <form [formGroup]="blockForm" (ngSubmit)="onSubmit()" class="space-y-4">
          <div>
            <label
              class="block text-[9px] font-black uppercase tracking-widest text-gray-400 mb-1.5"
              >IP Address</label
            >
            <input
              type="text"
              formControlName="ipAddress"
              placeholder="e.g. 192.168.1.1"
              class="w-full h-9 px-3 rounded-xl bg-gray-50 dark:bg-background-dark border border-gray-100 text-xs font-black text-primary dark:text-white placeholder-gray-400 focus:ring-1 focus:ring-primary outline-none"
            />
            <p
              *ngIf="
                blockForm.get('ipAddress')?.touched &&
                blockForm.get('ipAddress')?.errors?.['pattern']
              "
              class="text-red-500 text-[10px] mt-1 font-bold"
            >
              Please enter a valid IPv4 address.
            </p>
          </div>
          <div>
            <label
              class="block text-[9px] font-black uppercase tracking-widest text-gray-400 mb-1.5"
              >Reason</label
            >
            <textarea
              formControlName="reason"
              placeholder="Why block?"
              rows="2"
              class="w-full px-3 py-2 rounded-xl bg-gray-50 dark:bg-background-dark border border-gray-100 text-xs font-black text-primary dark:text-white placeholder-gray-400 focus:ring-1 focus:ring-primary outline-none resize-none"
            ></textarea>
          </div>
          <button
            type="submit"
            [disabled]="blockForm.invalid || isLoading"
            class="w-full py-2 bg-red-500 hover:bg-red-600 disabled:opacity-50 text-white rounded-xl font-black text-[10px] uppercase tracking-widest transition-all shadow-lg shadow-red-500/20"
          >
            Block IP
          </button>
        </form>
      </div>
    </div>

    <!-- Blocked List -->
    <div class="lg:col-span-2">
      <div
        class="bg-white dark:bg-surface-dark border border-gray-100 dark:border-gray-800 rounded-2xl overflow-hidden shadow-sm flex flex-col min-h-[400px]"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr
                class="border-b border-gray-100 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-800/50 text-[9px] uppercase font-black tracking-widest text-gray-400"
              >
                <th class="px-3 py-2">IP Address</th>
                <th class="px-3 py-2">Reason</th>
                <th class="px-3 py-2">Blocked At</th>
                <th class="px-3 py-2 text-right">Action</th>
              </tr>
            </thead>
            <tbody
              class="divide-y divide-gray-100 dark:divide-gray-800 text-sm text-primary dark:text-white"
            >
              <tr *ngIf="isLoading">
                <td colspan="4" class="p-8 text-center text-gray-500">
                  Loading blocklist...
                </td>
              </tr>
              <tr *ngIf="!isLoading && blockedIps.length === 0">
                <td colspan="4" class="p-8 text-center text-gray-500 italic">
                  No IPs are currently blocked.
                </td>
              </tr>
              <tr
                *ngFor="let ip of blockedIps"
                class="hover:bg-red-50 transition-colors border-b border-gray-50"
              >
                <td
                  class="px-3 py-2 font-black text-red-500 text-[11px]"
                >
                  {{ ip.ipAddress }}
                </td>
                <td
                  class="px-3 py-2 text-[10px] font-bold text-gray-400 max-w-[200px] truncate"
                  [title]="ip.reason || 'No reason provided'"
                >
                  {{ ip.reason || "—" }}
                </td>
                <td class="px-3 py-2 text-gray-400">
                  <div class="flex flex-col">
                    <span class="font-black text-[10px]">{{
                      ip.blockedAt | date: "mediumDate"
                    }}</span>
                  </div>
                </td>
                <td class="px-3 py-2 text-right">
                  <button
                    (click)="unblockIp(ip.id)"
                    class="text-[10px] font-black text-emerald-500 hover:underline uppercase tracking-widest"
                  >
                    Unblock
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
