<div class="max-w-[1000px] mx-auto pb-20">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div class="flex items-center gap-4">
      <a routerLink="/admin/products" class="w-10 h-10 flex items-center justify-center rounded-lg bg-surface-light dark:bg-surface-dark border border-border-light dark:border-border-dark text-text-secondary-light hover:text-primary transition-colors">
        <app-icon name="ArrowLeft" size="20"></app-icon>
      </a>
      <div>
        <h2 class="text-2xl font-bold text-text-main-light dark:text-text-main-dark">Custom Landing Page Settings</h2>
        <p class="text-xs font-medium text-text-secondary-light uppercase tracking-wider" *ngIf="product">For: {{ product.name }}</p>
      </div>
    </div>
    <button (click)="onSubmit()" [disabled]="isSaving" class="flex h-11 items-center justify-center gap-2 rounded-lg bg-primary px-6 text-sm font-bold text-white hover:bg-[#083a4a] shadow-lg shadow-primary/20 disabled:opacity-50">
      <app-icon *ngIf="isSaving" name="Loader2" size="20" className="animate-spin"></app-icon>
      <app-icon *ngIf="!isSaving" name="Save" size="20"></app-icon>
      <span>Save Changes</span>
    </button>
  </div>

  <div *ngIf="isLoading" class="flex flex-col items-center justify-center py-20">
    <app-icon name="Loader2" size="40" className="animate-spin text-primary/20"></app-icon>
    <p class="text-xs font-bold text-text-secondary-light uppercase tracking-widest mt-4">Loading configuration...</p>
  </div>

  <form *ngIf="!isLoading" [formGroup]="configForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">
    
    <!-- Section: Timer & Banner -->
    <div class="bg-surface-light dark:bg-surface-dark border border-border-light dark:border-border-dark rounded-xl p-6 shadow-sm space-y-6">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
            <app-icon name="Info" size="16"></app-icon>
        </div>
        <h3 class="text-sm font-bold text-text-main-light dark:text-text-main-dark uppercase tracking-wider">Timer & Hero Banner</h3>
      </div>

      <div class="space-y-4">
        <div class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark rounded-lg border border-border-light dark:border-border-dark">
            <label class="text-xs font-bold text-text-main-light dark:text-text-main-dark">Show Countdown Timer</label>
            <input type="checkbox" formControlName="isTimerVisible" class="w-10 h-5 rounded-full bg-gray-200 dark:bg-gray-700 checked:bg-primary appearance-none cursor-pointer transition-colors relative after:content-[''] after:absolute after:top-1 after:left-1 after:w-3 after:h-3 after:bg-white after:rounded-full after:transition-transform checked:after:translate-x-5">
        </div>

        <div class="grid grid-cols-1 gap-4" *ngIf="configForm.get('isTimerVisible')?.value">
            <div>
                <label class="block text-[10px] font-bold text-text-secondary-light uppercase tracking-widest mb-1.5 ml-1">Relative Timer (Minutes)</label>
                <input type="number" formControlName="relativeTimerTotalMinutes" placeholder="e.g. 120" class="w-full h-11 px-4 rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
            </div>
        </div>

        <div>
            <label class="block text-[10px] font-bold text-text-secondary-light uppercase tracking-widest mb-1.5 ml-1">Header Title (Bengali)</label>
            <input type="text" formControlName="headerTitle" class="w-full h-11 px-4 rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
        </div>

      </div>
    </div>

    <!-- Section: Product Details -->
    <div class="bg-surface-light dark:bg-surface-dark border border-border-light dark:border-border-dark rounded-xl p-6 shadow-sm space-y-6">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
              <app-icon name="Info" size="16"></app-icon>
          </div>
          <h3 class="text-sm font-bold text-text-main-light dark:text-main-dark uppercase tracking-wider">Product Features</h3>
        </div>
  
        <div class="space-y-4">
          <div class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark rounded-lg border border-border-light dark:border-border-dark">
              <label class="text-xs font-bold text-text-main-light dark:text-text-main-dark">Show Details Section</label>
              <input type="checkbox" formControlName="isProductDetailsVisible" class="w-10 h-5 rounded-full bg-gray-200 dark:bg-gray-700 checked:bg-primary appearance-none cursor-pointer transition-colors relative after:content-[''] after:absolute after:top-1 after:left-1 after:w-3 after:h-3 after:bg-white after:rounded-full after:transition-transform checked:after:translate-x-5">
          </div>
  
          <div>
              <label class="block text-[10px] font-bold text-text-secondary-light uppercase tracking-widest mb-1.5 ml-1">Details Section Title</label>
              <input type="text" formControlName="productDetailsTitle" class="w-full h-11 px-4 rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
          </div>
  
          <div class="grid grid-cols-2 gap-4">
            <div class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark rounded-lg border border-border-light dark:border-border-dark">
                <div class="flex flex-col">
                  <label class="text-[10px] font-bold text-text-main-light dark:text-text-main-dark uppercase tracking-widest">Fabric Section</label>
                  <span class="text-[9px] font-bold text-text-secondary-light uppercase">Visible in page</span>
                </div>
                <input type="checkbox" formControlName="isFabricVisible" class="w-10 h-5 rounded-full bg-gray-200 dark:bg-gray-700 checked:bg-primary appearance-none cursor-pointer transition-colors relative after:content-[''] after:absolute after:top-1 after:left-1 after:w-3 after:h-3 after:bg-white after:rounded-full after:transition-transform checked:after:translate-x-5">
            </div>

            <div class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark rounded-lg border border-border-light dark:border-border-dark">
              <div class="flex flex-col">
                <label class="text-[10px] font-bold text-text-main-light dark:text-text-main-dark uppercase tracking-widest">Design Section</label>
                <span class="text-[9px] font-bold text-text-secondary-light uppercase">Visible in page</span>
              </div>
              <input type="checkbox" formControlName="isDesignVisible" class="w-10 h-5 rounded-full bg-gray-200 dark:bg-gray-700 checked:bg-primary appearance-none cursor-pointer transition-colors relative after:content-[''] after:absolute after:top-1 after:left-1 after:w-3 after:h-3 after:bg-white after:rounded-full after:transition-transform checked:after:translate-x-5">
            </div>
          </div>
        </div>
    </div>

    <!-- Section: Trust & Forms -->
    <div class="bg-surface-light dark:bg-surface-dark border border-border-light dark:border-border-dark rounded-xl p-6 shadow-sm space-y-6 md:col-span-2">
        <div class="flex items-center gap-2 mb-4">
            <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
                <app-icon name="Info" size="16"></app-icon>
            </div>
            <h3 class="text-sm font-bold text-text-main-light dark:text-text-main-dark uppercase tracking-wider">Checkout & Trust</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-4">
                <div class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark rounded-lg border border-border-light dark:border-border-dark">
                    <label class="text-xs font-bold text-text-main-light dark:text-text-main-dark">Show Trust Banner</label>
                    <input type="checkbox" formControlName="isTrustBannerVisible" class="w-10 h-5 rounded-full bg-gray-200 dark:bg-gray-700 checked:bg-primary appearance-none cursor-pointer transition-colors relative after:content-[''] after:absolute after:top-1 after:left-1 after:w-3 after:h-3 after:bg-white after:rounded-full after:transition-transform checked:after:translate-x-5">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-text-secondary-light uppercase tracking-widest mb-1.5 ml-1">Trust Text (Orange Banner)</label>
                    <textarea formControlName="trustBannerText" rows="3" class="w-full p-4 rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"></textarea>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-text-secondary-light uppercase tracking-widest mb-1.5 ml-1">Signature Name (In Form)</label>
                    <input type="text" formControlName="featuredProductName" class="w-full h-11 px-4 rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-text-secondary-light uppercase tracking-widest mb-1.5 ml-1">Promo Price (৳)</label>
                        <input type="number" formControlName="promoPrice" class="w-full h-11 px-4 rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-text-secondary-light uppercase tracking-widest mb-1.5 ml-1">Original Price (৳)</label>
                        <input type="number" formControlName="originalPrice" class="w-full h-11 px-4 rounded-lg border border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                    </div>
                </div>
            </div>
        </div>
    </div>
  </form>

  <!-- Notifications -->
  <div *ngIf="successMessage" class="fixed bottom-8 right-8 bg-emerald-500 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 animate-in slide-in-from-right-10 duration-500">
    <app-icon name="Save" size="20"></app-icon>
    <span class="text-sm font-bold uppercase tracking-wider">{{ successMessage }}</span>
  </div>

  <div *ngIf="errorMessage" class="fixed bottom-8 right-8 bg-red-500 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 animate-in slide-in-from-right-10 duration-500">
    <app-icon name="Info" size="20"></app-icon>
    <span class="text-sm font-bold uppercase tracking-wider">{{ errorMessage }}</span>
  </div>
</div>
