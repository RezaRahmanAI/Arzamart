<div class="p-3">
  <div class="mb-4">
    <h1 class="text-xl font-black text-primary uppercase tracking-tight">Reviews</h1>
    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest opacity-70">
      Moderate customer feedback
    </p>
  </div>

  <div class="grid grid-cols-1 gap-2">
    <div
      *ngFor="let review of reviews"
      class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-4 hover:shadow-md transition-shadow"
    >
      <div class="flex-shrink-0 flex items-start gap-3">
        <div
          class="size-8 rounded-full bg-gray-50 flex items-center justify-center overflow-hidden"
        >
          <img
            *ngIf="review.userAvatar"
            [src]="review.userAvatar"
            class="w-full h-full object-cover"
          />
          <app-icon
            *ngIf="!review.userAvatar"
            name="User"
            size="16"
            className="text-gray-300"
          ></app-icon>
        </div>
        <div>
          <h3 class="text-xs font-black text-primary">{{ review.userName }}</h3>
          <div class="flex items-center gap-1 text-[8px] font-bold text-gray-400 uppercase tracking-tighter">
            <span>{{ review.createdAt | date: "mediumDate" }}</span>
            <span
              *ngIf="review.isVerifiedPurchase"
              class="text-emerald-500 flex items-center gap-0.5"
            >
              Verified
            </span>
          </div>
        </div>
      </div>

      <div class="flex-grow">
        <div class="flex items-center gap-0.5 mb-1">
          <app-icon
            *ngFor="let s of getStars(review.rating)"
            name="Star"
            size="12"
            className="text-yellow-400 fill-yellow-400"
          ></app-icon>
          <app-icon
            *ngFor="let s of [1, 2, 3, 4, 5].slice(review.rating)"
            name="Star"
            size="12"
            className="text-gray-200"
          ></app-icon>
        </div>
        <p class="text-gray-600 text-[10px] font-medium leading-relaxed mb-1">
          {{ review.comment }}
        </p>
        <div
          class="flex items-center gap-3 text-[9px] font-black uppercase tracking-widest text-gray-400 border-t border-gray-50 pt-2"
        >
          <span class="flex items-center gap-1">
            <app-icon name="ShoppingBag" size="12"></app-icon>
            {{ review.productName }}
          </span>
          <span class="flex items-center gap-1">
            <app-icon name="ThumbsUp" size="12"></app-icon>
            {{ review.likes }}
          </span>
        </div>
      </div>

      <div
        class="flex md:flex-col gap-1 justify-center border-l md:pl-4 border-gray-50"
      >
        <button
          (click)="openEditModal(review)"
          class="size-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-primary hover:bg-gray-50 transition-all"
          title="Edit"
        >
          <app-icon name="Edit" size="16"></app-icon>
        </button>
        <button
          *ngIf="authService.isSuperAdmin()"
          (click)="deleteReview(review.id)"
          class="size-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all"
          title="Delete"
        >
          <app-icon name="Trash2" size="16"></app-icon>
        </button>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div
    *ngIf="reviews.length === 0"
    class="py-20 text-center bg-gray-50 rounded-3xl border-2 border-dashed border-gray-100"
  >
    <app-icon
      name="MessageSquare"
      size="64"
      className="text-gray-200 mb-4 mx-auto"
    ></app-icon>
    <h3 class="text-lg font-medium text-gray-600">No reviews found</h3>
    <p class="text-gray-500">Reviews from your customers will appear here.</p>
  </div>
</div>

<!-- Edit Modal -->
<div
  *ngIf="isModalOpen"
  class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4"
>
  <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
    <div class="px-4 py-3 border-b border-gray-50 flex justify-between items-center">
      <h2 class="text-sm font-black text-primary uppercase tracking-tight">Edit Review</h2>
      <button
        (click)="closeModal()"
        class="size-7 hover:bg-gray-50 rounded-lg flex items-center justify-center transition-all"
      >
        <app-icon name="X" size="14" className="text-gray-400"></app-icon>
      </button>
    </div>

    <form [formGroup]="reviewForm" (ngSubmit)="onSubmit()" class="p-4">
      <div class="mb-4">
        <label class="block text-[9px] font-black text-gray-400 uppercase tracking-widest mb-2">Rating</label>
        <div class="flex gap-1">
          <button
            type="button"
            *ngFor="let r of [1, 2, 3, 4, 5]"
            (click)="reviewForm.patchValue({ rating: r })"
            class="transition-all"
            [ngClass]="reviewForm.get('rating')?.value! >= r ? 'text-yellow-400' : 'text-gray-200'"
          >
            <app-icon
              name="Star"
              size="24"
              [className]="reviewForm.get('rating')?.value! >= r ? 'fill-yellow-400' : ''"
            ></app-icon>
          </button>
        </div>
      </div>

      <div class="mb-4">
        <label class="block text-[9px] font-black text-gray-400 uppercase tracking-widest mb-2">Comment</label>
        <textarea
          formControlName="comment"
          rows="3"
          class="w-full px-3 py-2 rounded-xl border border-gray-100 bg-gray-50/50 text-xs font-bold text-primary focus:ring-1 focus:ring-primary outline-none resize-none"
        ></textarea>
      </div>

      <div class="flex gap-2">
        <button
          type="button"
          (click)="closeModal()"
          class="flex-1 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest text-gray-400 hover:bg-gray-50 transition-all"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="isSubmitting"
          class="flex-1 py-2 rounded-xl bg-primary text-white text-[10px] font-black uppercase tracking-widest hover:bg-primary/90 disabled:opacity-50 transition-all shadow-lg shadow-primary/20"
        >
          Save
        </button>
      </div>
    </form>
  </div>
</div>
