<div class="p-3">
  <div class="flex justify-between items-center mb-4">
    <div>
      <h1 class="text-xl font-black text-primary uppercase tracking-tight">Navigation</h1>
      <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest opacity-70">
        Menu structure management
      </p>
    </div>
    <button
      (click)="openAddModal()"
      class="flex items-center gap-2 arza-btn-primary h-8 px-3 rounded-lg text-xs"
    >
      <app-icon name="Plus" size="14"></app-icon>
      Add Menu
    </button>
  </div>

  <div
    class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden"
  >
    <div
      class="bg-gray-50 px-4 py-2 border-b border-gray-100 flex items-center justify-between"
    >
      <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest"
        >Hierarchy</span
      >
    </div>

    <div class="p-3">
      <ng-container
        *ngTemplateOutlet="menuTree; context: { $implicit: menus, depth: 0 }"
      ></ng-container>
    </div>

    <!-- Recursive Template -->
    <ng-template #menuTree let-items let-depth="depth">
      <div class="flex flex-col gap-2" [style.padding-left.px]="depth * 20">
        <div *ngFor="let item of items" class="group">
          <div
            class="flex items-center justify-between p-2 rounded-xl border border-gray-50 hover:border-primary/30 hover:bg-primary/[0.02] transition-all group"
          >
            <div class="flex items-center gap-2">
              <app-icon
                name="GripVertical"
                size="14"
                className="text-gray-200 drag-handle cursor-move group-hover:text-primary/40"
              ></app-icon>
              <div class="flex flex-col">
                <span class="font-black text-xs text-primary">{{
                  item.name
                }}</span>
                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">{{ item.link }}</span>
              </div>
            </div>
            <div
              class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity"
            >
              <button
                (click)="openAddModal(item.id)"
                class="size-7 flex items-center justify-center hover:bg-primary/10 rounded-lg text-primary transition-colors"
                title="Add Sub-menu"
              >
                <app-icon name="Plus" size="14"></app-icon>
              </button>
              <button
                (click)="openEditModal(item)"
                class="size-7 flex items-center justify-center hover:bg-gray-100 rounded-lg text-gray-400 transition-colors"
                title="Edit"
              >
                <app-icon name="Edit" size="14"></app-icon>
              </button>
              <button
                *ngIf="authService.isSuperAdmin()"
                (click)="deleteMenu(item.id)"
                class="size-7 flex items-center justify-center hover:bg-red-50 rounded-lg text-red-400 transition-colors"
                title="Delete"
              >
                <app-icon name="Trash2" size="14"></app-icon>
              </button>
            </div>
          </div>
          <div
            *ngIf="item.childMenus && item.childMenus.length > 0"
            class="mt-2 ml-4 border-l-2 border-gray-50 pl-4 py-1"
          >
            <ng-container
              *ngTemplateOutlet="
                menuTree;
                context: { $implicit: item.childMenus, depth: 0 }
              "
            ></ng-container>
          </div>
        </div>
      </div>
    </ng-template>

    <!-- Empty State -->
    <div *ngIf="menus.length === 0" class="p-12 text-center">
      <app-icon
        name="ChevronRight"
        size="48"
        className="text-gray-200 mb-4 mx-auto"
      ></app-icon>
      <h3 class="text-lg font-medium text-gray-600">No menu items found</h3>
      <p class="text-gray-500 mb-6">
        Start building your site navigation structure.
      </p>
    </div>
  </div>
</div>

<!-- Modal -->
<div
  *ngIf="isModalOpen"
  class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4"
>
  <div
    class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden"
  >
    <div
      class="px-4 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50"
    >
      <h2 class="text-sm font-black text-primary uppercase tracking-tight">
        {{ isEditing ? "Edit Menu" : "Add Menu" }}
      </h2>
      <button
        (click)="closeModal()"
        class="size-7 hover:bg-gray-200 rounded-lg flex items-center justify-center transition-all"
      >
        <app-icon
          name="X"
          size="14"
          className="text-gray-400"
        ></app-icon>
      </button>
    </div>

    <form [formGroup]="menuForm" (ngSubmit)="onSubmit()" class="p-4">
      <div class="space-y-4">
        <div>
          <label class="block text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Display Name</label>
          <input
            type="text"
            formControlName="name"
            class="w-full h-9 px-3 rounded-xl border border-gray-100 bg-gray-50/50 text-xs font-bold text-primary focus:ring-1 focus:ring-primary outline-none"
            placeholder="e.g. New Arrivals"
          />
        </div>

        <div>
          <label class="block text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Link Target</label>
          <input
            type="text"
            formControlName="link"
            class="w-full h-9 px-3 rounded-xl border border-gray-100 bg-gray-50/50 text-xs font-bold text-primary focus:ring-1 focus:ring-primary outline-none"
            placeholder="e.g. /category/new-arrivals"
          />
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Parent</label>
            <select
              formControlName="parentMenuId"
              class="w-full h-9 px-3 rounded-xl border border-gray-100 bg-gray-50/50 text-xs font-bold text-primary focus:ring-1 focus:ring-primary outline-none"
            >
              <option [ngValue]="null">None (Root)</option>
              <option *ngFor="let m of getMenuItems()" [ngValue]="m.id">
                {{ m.name }}
              </option>
            </select>
          </div>
          <div>
            <label class="block text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Order</label>
            <input
              type="number"
              formControlName="displayOrder"
              class="w-full h-9 px-3 rounded-xl border border-gray-100 bg-gray-50/50 text-xs font-bold text-primary focus:ring-1 focus:ring-primary outline-none"
            />
          </div>
        </div>

        <div class="flex items-center gap-2">
          <input
            type="checkbox"
            id="menuIsActive"
            formControlName="isActive"
            class="size-4 rounded border-gray-300 text-primary focus:ring-primary"
          />
          <label for="menuIsActive" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Active</label>
        </div>
      </div>

      <div class="flex gap-2 mt-6">
        <button
          type="button"
          (click)="closeModal()"
          class="flex-1 h-9 rounded-xl text-[10px] font-black uppercase tracking-widest text-gray-400 hover:bg-gray-50 transition-all"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="isSubmitting"
          class="flex-1 h-9 rounded-xl bg-primary text-white text-[10px] font-black uppercase tracking-widest hover:bg-primary/90 disabled:opacity-50 transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2"
        >
          <app-icon *ngIf="isSubmitting" name="Loader2" size="14" className="animate-spin"></app-icon>
          {{ isSubmitting ? "Saving" : (isEditing ? "Save" : "Create") }}
        </button>
      </div>
    </form>
  </div>
</div>
