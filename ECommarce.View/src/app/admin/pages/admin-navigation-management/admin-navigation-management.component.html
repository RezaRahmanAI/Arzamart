<div class="site-container-admin mx-auto flex flex-col gap-ds-8">
  <!-- Page Header -->
  <div class="flex flex-col md:flex-row md:items-start justify-between gap-ds-6">
    <div>
      <h1 class="text-ds-text">Navigation Menu</h1>
      <p class="text-ds-text-muted mt-1.5">
        Manage menu items
      </p>
    </div>
    <button
      (click)="openAddModal()"
      class="btn btn-primary h-11 px-ds-8"
     *ngIf="authService.currentUserSnapshot()?.role !== 'Staff'">
      <app-icon name="Plus" size="14"></app-icon>
      <span>Add Menu Item</span>
    </button>
  </div>

  <div class="bg-ds-surface rounded-sm border border-ds-border overflow-hidden shadow-sm">
    <div class="px-ds-6 py-ds-3 border-b border-ds-border bg-ds-bg/50">
      <span class="text-ds-text-muted">Menu Structure</span>
    </div>

    <div class="p-ds-6">
      <ng-container
        *ngTemplateOutlet="menuTree; context: { $implicit: menus, depth: 0 }"
      ></ng-container>
    </div>

    <!-- Recursive Template -->
    <ng-template #menuTree let-items let-depth="depth">
      <div class="flex flex-col gap-ds-3" [style.padding-left.px]="depth * 24">
        <div *ngFor="let item of items" class="group/node">
          <div
            class="flex items-center justify-between p-ds-4 rounded-sm border border-ds-border bg-ds-bg/20 hover:border-ds-text hover:bg-ds-surface transition-all group"
          >
            <div class="flex items-center gap-ds-4">
              <app-icon
                name="GripVertical"
                size="16"
                className="text-ds-text-muted/20 drag-handle cursor-move group-hover:text-ds-text transition-colors"
              ></app-icon>
              <div class="flex flex-col">
                <span class="text-ds-text">{{ item.name }}</span>
                <span class="text-ds-text-muted mt-0.5">{{ item.link }}</span>
              </div>
            </div>
            <div
              class="flex items-center gap-ds-2 opacity-0 group-hover:opacity-100 transition-opacity"
            >
              <button
                (click)="openAddModal(item.id)"
                class="size-8 flex items-center justify-center rounded-sm border border-ds-border text-ds-text-muted hover:text-ds-text hover:border-ds-text transition-colors"
                title="Add Sub Menu"
              >
                <app-icon name="Plus" size="14"></app-icon>
              </button>
              <button
                (click)="openEditModal(item)"
                class="size-8 flex items-center justify-center rounded-sm border border-ds-border text-ds-text-muted hover:text-ds-text hover:border-ds-text transition-colors"
                title="Edit"
              >
                <app-icon name="Edit3" size="14"></app-icon>
              </button>
              <button
                *ngIf="authService.isSuperAdmin()"
                (click)="deleteMenu(item.id)"
                class="size-8 flex items-center justify-center rounded-sm border border-ds-border text-ds-text-muted hover:text-red-500 hover:border-red-500 transition-colors"
                title="Delete"
              >
                <app-icon name="Trash2" size="14"></app-icon>
              </button>
            </div>
          </div>
          <div
            *ngIf="item.childMenus && item.childMenus.length > 0"
            class="mt-ds-3 ml-ds-4 border-l border-ds-border/50 pl-ds-6 py-1"
          >
            <ng-container
              *ngTemplateOutlet="
                menuTree;
                context: { $implicit: item.childMenus, depth: 0 }
              "
            ></ng-container>
          </div>
        </div>
      </div>
    </ng-template>

    <!-- Empty State -->
    <div *ngIf="menus.length === 0" class="py-ds-24 text-center">
      <app-icon
        name="Map"
        size="64"
        className="text-ds-text-muted opacity-10 mb-ds-6 mx-auto"
      ></app-icon>
      <h3 class="text-ds-text-muted mb-2">No menu items</h3>
      <p class="text-ds-text-muted/60 mb-ds-8">
        No menu items added yet.
      </p>
      <button (click)="openAddModal()" class="btn btn-secondary !h-10 !px-ds-8">
        Add First Menu Item
      </button>
    </div>
  </div>
</div>

<!-- Modal -->
<div
  *ngIf="isModalOpen"
  class="fixed inset-0 bg-ds-text/60 backdrop-blur-md z-50 flex items-center justify-center p-4"
  (click)="closeModal()"
>
  <div
    class="bg-ds-surface rounded-sm border border-ds-border w-full max-w-md shadow-2xl overflow-hidden"
    (click)="$event.stopPropagation()"
  >
    <div
      class="px-ds-8 py-ds-4 border-b border-ds-border flex justify-between items-center bg-ds-bg/50"
    >
      <div>
        <h2 class="text-ds-text">
          {{ isEditing ? "Edit Menu Item" : "Add Menu Item" }}
        </h2>
        <p class="text-ds-text-muted mt-0.5">Menu settings</p>
      </div>
      <button
        (click)="closeModal()"
        class="size-10 flex items-center justify-center hover:bg-ds-text/10 transition-colors rounded-sm text-ds-text-muted hover:text-ds-text"
      >
        <app-icon name="X" size="18"></app-icon>
      </button>
    </div>

    <form [formGroup]="menuForm" (ngSubmit)="onSubmit()" class="p-ds-8 flex flex-col gap-ds-6">
      <div class="space-y-ds-4">
        <div class="space-y-2">
          <label class="block text-ds-text ml-1 mb-1.5">Menu Name</label>
          <input
            type="text"
            formControlName="name"
            class="form-input !h-11 !px-ds-4"
            placeholder="E.G. AUTUMN ARCHIVE"
          />
        </div>

        <div class="space-y-2">
          <label class="block text-ds-text ml-1 mb-1.5">Link URL</label>
          <input
            type="text"
            formControlName="link"
            class="form-input !h-11 !px-ds-4"
            placeholder="E.G. /COLLECTIONS/AUTUMN"
          />
        </div>

        <div class="grid grid-cols-2 gap-ds-4">
          <div class="space-y-2">
            <label class="block text-ds-text ml-1 mb-1.5">Parent Menu</label>
            <select
              formControlName="parentMenuId"
              class="form-input !h-11 !px-ds-4 appearance-none cursor-pointer"
            >
              <option [ngValue]="null">Top Level</option>
              <option *ngFor="let m of getMenuItems()" [ngValue]="m.id">
                {{ m.name }}
              </option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="block text-ds-text ml-1 mb-1.5">Sort Order</label>
            <input
              type="number"
              formControlName="displayOrder"
              class="form-input !h-11 !px-ds-4"
            />
          </div>
        </div>

        <div class="flex items-center gap-ds-3 pt-ds-2">
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" formControlName="isActive" class="sr-only peer">
            <div class="w-11 h-6 bg-ds-border peer-focus:outline-none rounded-sm peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-ds-surface after:border-ds-border after:border after:rounded-sm after:h-5 after:w-5 after:transition-all peer-checked:bg-ds-text"></div>
          </label>
          <span class="text-ds-text">Active</span>
        </div>
      </div>

      <div class="flex gap-ds-4 mt-ds-4">
        <button
          type="button"
          (click)="closeModal()"
          class="btn btn-secondary flex-1 !h-12"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="isSubmitting"
          class="btn btn-primary flex-[2] !h-12 !bg-ds-text !text-ds-surface flex items-center justify-center gap-ds-2"
        >
          <app-icon *ngIf="isSubmitting" name="Loader2" size="16" className="animate-spin"></app-icon>
          <span>{{ isSubmitting ? "Syncing" : (isEditing ? "Save Changes" : "Add Menu Item") }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
