<header
  class="h-16 md:h-20 bg-ds-surface border-b border-ds-border px-ds-4 md:px-ds-8 flex items-center justify-between flex-shrink-0 z-10"
>
  <div class="flex items-center gap-ds-4">
    <!-- Mobile Menu Toggle -->
    <button
      (click)="sidebarService.toggle()"
      class="p-ds-2 -ml-ds-2 text-ds-text-muted hover:bg-ds-bg rounded-sm transition-colors lg:hidden"
      type="button"
    >
      <app-icon name="Menu" size="24"></app-icon>
    </button>
    <h2 class="text-ds-text text-lg font-bold tracking-tight uppercase">
      {{ pageTitle$ | async }}
    </h2>
  </div>

  <div class="flex items-center gap-ds-4 md:gap-ds-8">
    <div class="relative w-64 lg:w-96 hidden md:block group">
      <span
        class="absolute inset-y-0 left-ds-4 flex items-center text-ds-text-muted group-focus-within:text-ds-text transition-colors"
      >
        <app-icon name="Search" size="16"></app-icon>
      </span>
      <input
        class="form-input !pl-ds-10 !h-11 !bg-ds-bg/50 !rounded-sm"
        placeholder="Search everything..."
        type="text"
        [formControl]="searchControl"
      />
    </div>

    <div class="flex items-center gap-ds-4 pl-ds-6 border-l border-ds-border">
      <button
        class="relative p-ds-2.5 text-ds-text-muted hover:text-ds-text hover:bg-ds-bg rounded-sm transition-all duration-base"
        type="button"
      >
        <app-icon name="Bell" size="20"></app-icon>
        <span
          class="absolute top-2.5 right-2.5 w-2 h-2 bg-ds-accent border-2 border-ds-surface rounded-full"
        ></span>
      </button>

      <!-- Profile Dropdown -->
      <div class="relative ml-ds-2" *ngIf="currentUser$ | async as user">
        <button
          (click)="toggleProfileDropdown()"
          class="flex items-center gap-ds-3 p-1.5 pr-ds-4 rounded-sm hover:bg-ds-bg border border-transparent hover:border-ds-border transition-all duration-base group"
          type="button"
        >
          <div class="relative flex-shrink-0">
            <div
              class="size-9 rounded-sm bg-ds-bg border border-ds-border flex items-center justify-center overflow-hidden transition-transform duration-base group-hover:scale-105"
            >
              <img
                *ngIf="user.avatarUrl"
                [src]="imageUrlService.getImageUrl(user.avatarUrl)"
                class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-base"
                [alt]="user.name"
              />
              <app-icon
                *ngIf="!user.avatarUrl"
                name="User"
                size="20"
                className="text-ds-text-muted opacity-40"
              ></app-icon>
            </div>
            <div class="absolute -bottom-0.5 -right-0.5 size-3 bg-ds-success border-2 border-ds-surface rounded-full"></div>
          </div>
          <div class="hidden sm:flex flex-col items-start gap-0.5">
            <span class="text-[11px] font-bold text-ds-text uppercase tracking-tight group-hover:text-ds-accent transition-colors leading-none">{{ user.name }}</span>
            <span class="text-[9px] font-bold text-ds-text-muted uppercase tracking-[0.2em] leading-none">{{ user.role }}</span>
          </div>
          <app-icon name="ChevronDown" size="14" className="text-ds-text-muted group-hover:text-ds-text transition-all duration-base" [className]="isProfileDropdownOpen ? 'rotate-180' : ''"></app-icon>
        </button>

        <!-- Dropdown Menu -->
        <div
          *ngIf="isProfileDropdownOpen"
          class="absolute right-0 mt-3 w-72 bg-ds-surface border border-ds-border rounded-sm shadow-2xl p-ds-2 z-50 animate-in fade-in slide-in-from-top-2 duration-base"
        >
          <div class="px-ds-4 py-ds-4 mb-ds-2 border-b border-ds-border bg-ds-bg/30">
            <p class="text-[9px] font-bold text-ds-text-muted uppercase tracking-[0.3em] mb-1.5">Authenticated as</p>
            <p class="text-[11px] font-bold text-ds-text truncate uppercase tracking-tight">{{ user.email }}</p>
          </div>

          <div class="space-y-1">
            <a
              href="/"
              target="_blank"
              class="flex items-center gap-ds-3 px-ds-4 py-ds-3 rounded-sm text-[10px] font-bold text-ds-text-sec hover:text-ds-text hover:bg-ds-bg transition-all duration-base group uppercase tracking-widest"
            >
              <app-icon name="Eye" size="16" className="text-ds-text-muted group-hover:text-ds-text"></app-icon>
              <span>View Live Marketplace</span>
            </a>
            

            <!-- Admin-only Management -->
            <ng-container *ngIf="authService.isSuperAdmin()">
              <div class="h-px bg-ds-border mx-ds-2 my-1"></div>
              
              <a
                routerLink="/admin/users"
                (click)="isProfileDropdownOpen = false"
                class="flex items-center gap-ds-3 px-ds-4 py-ds-3 rounded-sm text-[10px] font-bold text-ds-text-sec hover:text-ds-text hover:bg-ds-bg transition-all duration-base group uppercase tracking-widest"
              >
                <app-icon name="Users" size="16" className="text-ds-text-muted group-hover:text-ds-text"></app-icon>
                <span>Staff Management</span>
              </a>

              <a
                routerLink="/admin/settings"
                (click)="isProfileDropdownOpen = false"
                class="flex items-center gap-ds-3 px-ds-4 py-ds-3 rounded-sm text-[10px] font-bold text-ds-text-sec hover:text-ds-text hover:bg-ds-bg transition-all duration-base group uppercase tracking-widest"
              >
                <app-icon name="Settings" size="16" className="text-ds-text-muted group-hover:text-ds-text"></app-icon>
                <span>System Preferences</span>
              </a>
            </ng-container>
          </div>

          <div class="mt-ds-2 pt-ds-2 border-t border-ds-border">
            <button
              (click)="logout()"
              class="w-full flex items-center gap-ds-3 px-ds-4 py-ds-3 rounded-sm text-[10px] font-bold text-red-500 hover:bg-red-500/5 transition-all duration-base group uppercase tracking-widest"
            >
              <app-icon name="LogOut" size="16" className="group-hover:translate-x-1 transition-transform"></app-icon>
              <span>Secure Logout</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
