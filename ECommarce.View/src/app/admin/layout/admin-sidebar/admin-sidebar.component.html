<aside
  class="fixed lg:sticky top-0 left-0 w-72 h-screen bg-ds-accent flex flex-col flex-shrink-0 transition-all duration-500 z-50 border-r border-ds-border lg:translate-x-0 overflow-hidden"
  [class.-translate-x-full]="!sidebarService.isOpen()"
  [class.translate-x-0]="sidebarService.isOpen()"
>
  <!-- Mobile Close Header -->
  <div class="lg:hidden flex justify-end p-ds-4 relative z-10">
    <button
      (click)="sidebarService.close()"
      class="p-ds-2 text-ds-hero-text/40 hover:text-white transition-colors bg-white/5 rounded-full"
      type="button"
    >
      <app-icon name="X" size="20"></app-icon>
    </button>
  </div>

  <!-- Main Scrollable Content -->
  <div class="flex-1 flex flex-col min-h-0 relative z-10">
    
    <!-- Header -->
    <div class="px-ds-8 pt-ds-12 pb-ds-8">
      <div class="flex items-center gap-ds-4 group cursor-default" *ngIf="settings$ | async as settings">
        <div class="relative">
          <div class="relative bg-white/5 border border-white/10 p-ds-3 rounded-sm backdrop-blur-md">
            <img
              *ngIf="settings.logoUrl"
              [src]="imageUrlService.getImageUrl(settings.logoUrl)"
              class="w-8 h-8 object-contain brightness-0 invert"
              alt="Logo"
            />
            <app-icon
              *ngIf="!settings.logoUrl"
              name="Store"
              size="24"
              className="text-white"
            ></app-icon>
          </div>
        </div>
        <div class="flex flex-col">
          <h1 class="text-white text-base font-bold uppercase tracking-tight leading-none">
            {{ settings.websiteName || "Admin Console" }}
          </h1>
          <span class="text-white/40 text-[9px] uppercase tracking-[0.3em] font-bold mt-1.5">
            Enterprise Panel
          </span>
        </div>
      </div>
    </div>

    <div class="h-px bg-ds-border/50 mx-ds-6 mb-ds-8"></div>

    <!-- Scrollable Nav Section -->
    <div class="flex-1 overflow-y-auto custom-sidebar-scroll px-ds-4 pb-ds-12">
      <div class="space-y-ds-10">
        <!-- Main Section -->
        <div>
          <p class="px-ds-4 mb-ds-6 text-[10px] font-bold text-white/30 uppercase tracking-[0.4em]">Core Navigation</p>
          <nav class="space-y-1">
            <a
              *ngFor="let item of topItems"
              class="flex items-center gap-ds-4 px-ds-4 py-ds-3.5 transition-all duration-300 group relative"
              [routerLink]="item.route"
              routerLinkActive="nav-active"
              #rla="routerLinkActive"
              [ngClass]="rla.isActive ? 'text-white bg-white/10' : 'text-white/40 hover:text-white hover:bg-white/5'"
              [routerLinkActiveOptions]="{ exact: false }"
            >
              <app-icon [name]="item.icon" size="20" className="transition-transform group-hover:scale-105" [className]="rla.isActive ? 'text-white' : ''"></app-icon>
              <span class="text-xs font-bold uppercase tracking-widest">{{ item.label }}</span>
              <div *ngIf="rla.isActive" class="absolute left-0 w-1 h-5 bg-white rounded-r-full"></div>
            </a>


            <!-- Orders Dropdown -->
            <div class="space-y-1">
              <button
                type="button"
                class="flex items-center justify-between gap-ds-4 px-ds-4 py-ds-3.5 transition-all duration-300 group w-full text-left relative"
                (click)="toggleOrdersMenu()"
                [ngClass]="(isOrdersMenuOpen || isGroupActive(['/admin/orders/pre-order', '/admin/orders/create'])) ? 'text-white bg-white/10' : 'text-white/40 hover:text-white hover:bg-white/5'"
              >
                <div class="flex items-center gap-ds-4">
                  <app-icon name="PlusCircle" size="20" className="group-hover:scale-105" [className]="isOrdersMenuOpen ? 'text-white' : ''"></app-icon>
                  <span class="text-xs font-bold uppercase tracking-widest">Orders</span>
                </div>
                <app-icon
                  [name]="isOrdersMenuOpen ? 'ChevronUp' : 'ChevronDown'"
                  size="14"
                  className="text-white/20 group-hover:text-white transition-colors"
                ></app-icon>
              </button>
              
              <div class="overflow-hidden transition-all duration-300" [style.max-height]="isOrdersMenuOpen ? '400px' : '0px'">
                <div class="pl-ds-12 pr-ds-4 py-ds-2 space-y-1">
                  <a
                    class="block px-ds-4 py-ds-2.5 text-[10px] font-bold text-white/30 hover:text-white transition-all rounded-sm hover:bg-white/5 uppercase tracking-widest"
                    routerLink="/admin/orders/pre-order"
                    routerLinkActive="text-white bg-white/5"
                    [routerLinkActiveOptions]="{ exact: true }"
                  >
                    Pre-Order Create
                  </a>
                  <a
                    class="block px-ds-4 py-ds-2.5 text-[10px] font-bold text-white/30 hover:text-white transition-all rounded-sm hover:bg-white/5 uppercase tracking-widest"
                    routerLink="/admin/orders/create"
                    routerLinkActive="text-white bg-white/5"
                    [routerLinkActiveOptions]="{ exact: true }"
                  >
                    Manual Order Create
                  </a>
                </div>
              </div>
            </div>

            <!-- Order View Dropdown -->
            <div class="space-y-1">
              <button
                type="button"
                class="flex items-center justify-between gap-ds-4 px-ds-4 py-ds-3.5 transition-all duration-300 group w-full text-left relative"
                (click)="toggleOrderViewMenu()"
                [ngClass]="(isOrderViewMenuOpen || isGroupActive(['/admin/orders', '/admin/orders/pre-orders', '/admin/orders/website'])) ? 'text-white bg-white/10' : 'text-white/40 hover:text-white hover:bg-white/5'"
              >
                <div class="flex items-center gap-ds-4">
                  <app-icon name="Eye" size="20" className="group-hover:scale-105" [className]="isOrderViewMenuOpen ? 'text-white' : ''"></app-icon>
                  <span class="text-xs font-bold uppercase tracking-widest">Order View</span>
                </div>
                <app-icon
                  [name]="isOrderViewMenuOpen ? 'ChevronUp' : 'ChevronDown'"
                  size="14"
                  className="text-white/20 group-hover:text-white transition-colors"
                ></app-icon>
              </button>
              
              <div class="overflow-hidden transition-all duration-300" [style.max-height]="isOrderViewMenuOpen ? '400px' : '0px'">
                <div class="pl-ds-12 pr-ds-4 py-ds-2 space-y-1">
                  <a
                    class="block px-ds-4 py-ds-2.5 text-[10px] font-bold text-white/30 hover:text-white transition-all rounded-sm hover:bg-white/5 uppercase tracking-widest"
                    routerLink="/admin/orders"
                    routerLinkActive="text-white bg-white/5"
                    [routerLinkActiveOptions]="{ exact: true }"
                  >
                    All Orders
                  </a>
                  <a
                    class="block px-ds-4 py-ds-2.5 text-[10px] font-bold text-white/30 hover:text-white transition-all rounded-sm hover:bg-white/5 uppercase tracking-widest"
                    routerLink="/admin/orders/pre-orders"
                    routerLinkActive="text-white bg-white/5"
                    [routerLinkActiveOptions]="{ exact: true }"
                  >
                    Pre Orders
                  </a>
                  <a
                    class="block px-ds-4 py-ds-2.5 text-[10px] font-bold text-white/30 hover:text-white transition-all rounded-sm hover:bg-white/5 uppercase tracking-widest"
                    routerLink="/admin/orders/website"
                    routerLinkActive="text-white bg-white/5"
                    [routerLinkActiveOptions]="{ exact: true }"
                  >
                    Website Orders
                  </a>
                </div>
              </div>
            </div>

            <!-- Inventory Dropdown -->
            <div class="space-y-1">
              <button
                type="button"
                class="flex items-center justify-between gap-ds-4 px-ds-4 py-ds-3.5 transition-all duration-300 group w-full text-left relative"
                (click)="toggleProductsMenu()"
                [ngClass]="(isProductsMenuOpen || isGroupActive(['/admin/products', '/admin/inventory'])) ? 'text-white bg-white/10' : 'text-white/40 hover:text-white hover:bg-white/5'"
              >
                <div class="flex items-center gap-ds-4">
                  <app-icon name="ShoppingBag" size="20" className="group-hover:scale-105" [className]="isProductsMenuOpen ? 'text-white' : ''"></app-icon>
                  <span class="text-xs font-bold uppercase tracking-widest">Inventory</span>
                </div>
                <app-icon
                  [name]="isProductsMenuOpen ? 'ChevronUp' : 'ChevronDown'"
                  size="14"
                  className="text-white/20 group-hover:text-white transition-colors"
                ></app-icon>
              </button>
              
              <div class="overflow-hidden transition-all duration-300" [style.max-height]="isProductsMenuOpen ? '400px' : '0px'">
                <div class="pl-ds-12 pr-ds-4 py-ds-2 space-y-1">
                  <a
                    class="block px-ds-4 py-ds-2.5 text-[10px] font-bold text-white/30 hover:text-white transition-all rounded-sm hover:bg-white/5 uppercase tracking-widest"
                    routerLink="/admin/products"
                    routerLinkActive="text-white bg-white/5"
                    [routerLinkActiveOptions]="{ exact: true }"
                  >
                    Product Catalog
                  </a>
                  <a
                    class="block px-ds-4 py-ds-2.5 text-[10px] font-bold text-white/30 hover:text-white transition-all rounded-sm hover:bg-white/5 uppercase tracking-widest"
                    routerLink="/admin/products/categories"
                    routerLinkActive="text-white bg-white/5"
                    [routerLinkActiveOptions]="{ exact: true }"
                  >
                    Main Collections
                  </a>
                  <a
                    class="block px-ds-4 py-ds-2.5 text-[10px] font-bold text-white/30 hover:text-white transition-all rounded-sm hover:bg-white/5 uppercase tracking-widest"
                    routerLink="/admin/products/sub-categories"
                    routerLinkActive="text-white bg-white/5"
                    [routerLinkActiveOptions]="{ exact: true }"
                  >
                    Sub Collections
                  </a>
                  <a
                    class="block px-ds-4 py-ds-2.5 text-[10px] font-bold text-white/30 hover:text-white transition-all rounded-sm hover:bg-white/5 uppercase tracking-widest"
                    routerLink="/admin/inventory"
                    routerLinkActive="text-white bg-white/5"
                    [routerLinkActiveOptions]="{ exact: true }"
                  >
                    Inventory Management
                  </a>
                </div>
              </div>
            </div>

            <a
              *ngFor="let item of navItems"
              class="flex items-center gap-ds-4 px-ds-4 py-ds-3.5 transition-all duration-300 group relative"
              [routerLink]="item.route"
              routerLinkActive="nav-active"
              #rlaSecondary="routerLinkActive"
              [ngClass]="rlaSecondary.isActive ? 'text-white bg-white/10' : 'text-white/40 hover:text-white hover:bg-white/5'"
              [routerLinkActiveOptions]="{ exact: false }"
            >
              <app-icon [name]="item.icon" size="20" className="transition-transform group-hover:scale-105" [className]="rlaSecondary.isActive ? 'text-white' : ''"></app-icon>
              <span class="text-xs font-bold uppercase tracking-widest">{{ item.label }}</span>
              <div *ngIf="rlaSecondary.isActive" class="absolute left-0 w-1 h-5 bg-white rounded-r-full"></div>
            </a>
          </nav>
        </div>


      </div>
    </div>
  </div>
</aside>
