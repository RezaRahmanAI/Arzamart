<div class="group relative flex flex-col bg-ds-bg overflow-hidden transition-all duration-base">
  <!-- Image Container -->
  <a [routerLink]="['/product', product.slug]" 
     class="relative aspect-[3/4] block overflow-hidden bg-ds-surface border border-ds-border transition-colors group-hover:border-ds-text">
    @if (mainImage) {
      <img
        [src]="imageUrlService.getImageUrl(mainImage)"
        [alt]="product.name"
        loading="lazy"
        decoding="async"
        class="h-full w-full object-cover transition-all duration-700 group-hover:scale-105"
      />
    }
    
    <!-- Sophisticated Badge -->
    <div class="absolute top-ds-4 left-ds-4">
      @if (hasDiscount) {
        <span class="bg-ds-text text-ds-bg px-ds-3 py-1 text-[10px] font-bold tracking-[0.2em] uppercase">
          -৳{{ discountAmount }}
        </span>
      }
    </div>

    <!-- Quick Shop Trigger (Hidden on Mobile) -->
    <div class="absolute bottom-0 left-0 right-0 p-ds-4 translate-y-full group-hover:translate-y-0 transition-transform duration-base hidden lg:block">
      <button 
        (click)="orderNow($event)"
        class="w-full h-11 bg-ds-bg/90 backdrop-blur-sm text-ds-text text-[10px] font-bold uppercase tracking-[0.3em] border border-ds-border hover:bg-ds-text hover:text-ds-bg hover:border-ds-text transition-all"
      >
        Quick Order
      </button>
    </div>
  </a>

  <!-- Content Area -->
  <div class="pt-ds-6 pb-ds-2 flex flex-col gap-ds-4 flex-1">
    <!-- Meta Info -->
    <div class="space-y-ds-2">
      <h3 class="text-[12px] font-bold tracking-[0.2em] text-ds-text truncate">
        {{ product.name }}
      </h3>
      <div class="flex items-center gap-ds-3">
        <p class="text-ds-base font-bold text-ds-text leading-none">৳{{ currentPrice }}</p>
        @if (hasDiscount) {
          <span class="text-[11px] text-ds-text-muted line-through font-medium">৳{{ originalPrice }}</span>
        }
      </div>
    </div>

    <!-- Size Selector -->
    @if (availableSizes.length > 0) {
      <div class="flex flex-wrap gap-ds-2">
        @for (size of availableSizes; track size) {
          <button
            (click)="selectSize(size); $event.preventDefault(); $event.stopPropagation()"
            class="h-8 min-w-[2.5rem] px-2 flex items-center justify-center text-[10px] font-bold uppercase transition-all border"
            [ngClass]="{
              'bg-ds-text border-ds-text text-ds-bg': selectedSize === size,
              'bg-ds-bg border-ds-border text-ds-text-sec hover:border-ds-text': selectedSize !== size
            }"
          >
            {{ size }}
          </button>
        }
      </div>
    }

    <!-- Mobile Actions (Always Visible) -->
    <div class="mt-auto lg:hidden">
      <button
        (click)="orderNow($event)"
        class="w-full h-11 bg-ds-text text-ds-bg text-[10px] font-bold uppercase tracking-[0.3em] transition-all"
      >
        Buy Now
      </button>
    </div>
  </div>

  <!-- Quick Add Modal -->
  @if (showQuickAdd) {
    <app-quick-add-modal
      [product]="$any(product)"
      [initialSize]="selectedSize"
      (close)="showQuickAdd = false; isOrdering = false"
      (added)="onQuickAddConfirm($event)"
    ></app-quick-add-modal>
  }
</div>
