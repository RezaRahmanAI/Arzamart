<div class="group relative flex flex-col bg-white overflow-hidden transition-all duration-300">
  <!-- Image Container (Perfect Alzeena Aspect) -->
  <a [routerLink]="['/product', product.slug]" class="relative aspect-[3/4] block overflow-hidden bg-supporting border border-border-color rounded sm:rounded-lg">
    <img
      *ngIf="mainImage"
      [src]="imageUrlService.getImageUrl(mainImage)"
      [alt]="product.name"
      loading="lazy"
      decoding="async"
      class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-105"
    />
    
    <!-- Sophisticated Badge -->
    <div class="absolute top-1.5 sm:top-2 left-1.5 sm:left-2">
      <span *ngIf="hasDiscount" class="px-1.5 sm:px-2 py-0.5 sm:py-1 bg-accent text-white text-[8px] sm:text-[9px] font-black uppercase rounded shadow-lg shadow-accent/20">
        -{{ discountPercentage }}%
      </span>
    </div>
  </a>

  <!-- Content Area (Clean & Aligned) -->
  <div class="pt-2 sm:pt-3 pb-1 sm:pb-2 px-1 sm:px-2 flex flex-col gap-1 sm:gap-2 flex-1">
    <!-- Meta Info (Black/Bold) -->
    <div>
      <p class="text-[9px] sm:text-[10px] md:text-[11px] text-primary font-semibold sm:font-bold uppercase tracking-tight mb-0.5 truncate">{{ product.sku || 'PL152' }} {{ product.name }}</p>
      <div class="flex items-center gap-1 sm:gap-2">
        <!-- Price in Accent Color (Alzeena Style) -->
        <h3 class="text-sm sm:text-[15px] md:text-[16px] lg:text-[17px] font-black text-accent leading-none">৳{{ currentPrice }}</h3>
        <span *ngIf="hasDiscount" class="text-[9px] sm:text-[10px] md:text-[11px] text-gray-300 line-through font-medium">৳{{ originalPrice }}</span>
      </div>
    </div>

    <!-- Slim Size Selector (Restored & Refined) -->
    <div *ngIf="availableSizes.length > 0" class="flex flex-wrap gap-0.5 sm:gap-1">
      <button
        *ngFor="let size of availableSizes"
        (click)="selectSize(size); $event.preventDefault(); $event.stopPropagation()"
        class="h-5 sm:h-6 min-w-[1.5rem] sm:min-w-[1.75rem] px-0.5 sm:px-1 flex items-center justify-center text-[8px] sm:text-[9px] font-black uppercase transition-all rounded-sm border"
        [ngClass]="selectedSize === size 
          ? 'bg-primary text-white border-primary' 
          : 'bg-white text-gray-400 border-gray-100 hover:border-accent'"
      >
        {{ size }}
      </button>
    </div>

    <!-- Actions (Wide & Flat Alzeena Style) -->
    <div class="mt-auto">
      <div class="flex flex-col gap-0.5 sm:gap-1">
        <button
          (click)="addToCart($event)"
          class="w-full h-7 sm:h-8 bg-white text-primary border border-gray-300 rounded text-[9px] sm:text-[10px] font-black uppercase tracking-wider sm:tracking-widest hover:bg-primary hover:text-white hover:border-primary transition-all duration-300"
        >
          ADD TO CART
        </button>
        <button
          (click)="orderNow($event)"
          class="w-full h-7 sm:h-8 bg-accent text-white rounded text-[9px] sm:text-[10px] font-black uppercase tracking-wider sm:tracking-widest hover:opacity-90 transition-all shadow-sm"
        >
          ORDER NOW
        </button>
      </div>
    </div>
  </div>

  <!-- Quick Add Modal (Hidden logic kept) -->
  <app-quick-add-modal
    *ngIf="showQuickAdd"
    [product]="$any(product)"
    [initialSize]="selectedSize"
    (close)="showQuickAdd = false; isOrdering = false"
    (added)="onQuickAddConfirm($event)"
  ></app-quick-add-modal>
</div>
