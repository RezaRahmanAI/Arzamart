<div class="group relative flex flex-col bg-ds-bg overflow-hidden transition-all duration-base">
  <!-- Image Container -->
  <a [routerLink]="['/product', product.slug]" 
     class="relative aspect-[3/4] block overflow-hidden bg-ds-surface border border-ds-border transition-colors group-hover:border-ds-text">
    @if (mainImage) {
      <img
        [src]="imageUrlService.getImageUrl(mainImage)"
        [alt]="product.name"
        loading="lazy"
        decoding="async"
        class="h-full w-full object-cover transition-all duration-700 group-hover:scale-105"
      />
    }
    
    <!-- Sophisticated Badge -->
    <div class="absolute top-ds-4 left-ds-4">
      @if (hasDiscount) {
        <span class="bg-red-500 text-white px-2 py-0.5 rounded-sm text-[10px] font-bold shadow-sm uppercase">
          -৳{{ discountAmount }} OFF
        </span>
      }
    </div>

    <!-- Quick Shop Trigger (Hidden on Mobile) -->
    <div class="absolute bottom-0 left-0 right-0 p-ds-4 translate-y-full group-hover:translate-y-0 transition-transform duration-base hidden lg:block">
      <button 
        (click)="orderNow($event)"
        class="w-full h-11 bg-ds-bg/90 backdrop-blur-sm text-ds-text border border-ds-border hover:bg-ds-text hover:text-ds-bg hover:border-ds-text transition-all"
      >
        Quick Order
      </button>
    </div>
  </a>

  <!-- Content Area -->
  <div class="pt-ds-6 pb-ds-2 flex flex-col items-start text-left gap-ds-4 flex-1">
    <!-- Meta Info -->
    <div class="space-y-1.5">
      <div class="flex items-center flex-nowrap gap-2">
        <span class="text-red-500 font-bold text-lg whitespace-nowrap">৳{{ currentPrice }}</span>
        @if (hasDiscount) {
          <span class="text-ds-text-muted line-through text-sm whitespace-nowrap opacity-70">৳{{ originalPrice }}</span>
        }
      </div>
      <h4 class="text-ds-text font-normal leading-tight line-clamp-2">
        {{ product.name }}
      </h4>
    </div>

    <!-- Size Selector -->
    @if (availableSizes.length > 0) {
      <div class="flex flex-wrap gap-ds-2">
        @for (size of availableSizes; track size) {
          <button
            (click)="selectSize(size); $event.preventDefault(); $event.stopPropagation()"
            class="h-8 min-w-[2.5rem] px-2 flex items-center justify-center transition-all border"
            [ngClass]="{
              'bg-ds-text border-ds-text text-ds-bg': selectedSize === size,
              'bg-ds-bg border-ds-border text-ds-text-sec hover:border-ds-text': selectedSize !== size
            }"
          >
            {{ size }}
          </button>
        }
      </div>
    }

    <!-- Mobile Actions (Always Visible) -->
    <div class="mt-auto lg:hidden w-full flex items-center gap-2">
      <button
        (click)="orderNow($event)"
        class="flex-1 h-11 bg-ds-accent text-ds-bg font-bold rounded-md transition-all active:scale-95 flex items-center justify-center"
      >
        Buy Now
      </button>
      <button
        (click)="addToCart($event)"
        class="size-11 flex items-center justify-center bg-ds-surface border border-ds-border text-ds-text rounded-md shadow-sm active:scale-95 transition-all"
      >
        <app-icon name="Heart" size="20"></app-icon>
      </button>
    </div>
  </div>

  <!-- Quick Add Modal -->
  @if (showQuickAdd) {
    <app-quick-add-modal
      [product]="$any(product)"
      [initialSize]="selectedSize"
      (close)="showQuickAdd = false; isOrdering = false"
      (added)="onQuickAddConfirm($event)"
    ></app-quick-add-modal>
  }
</div>
