<div class="group relative flex flex-col bg-ds-bg overflow-hidden transition-all duration-fast">
  <!-- Image Container -->
  <a [routerLink]="['/product', product.slug]" 
     class="relative aspect-[3/4] block overflow-hidden bg-ds-surface border border-ds-border rounded-lg transition-colors hover:border-ds-text-muted">
    @if (mainImage) {
      <img
        [src]="imageUrlService.getImageUrl(mainImage)"
        [alt]="product.name"
        loading="lazy"
        decoding="async"
        class="h-full w-full object-cover p-2 transition-transform duration-700 group-hover:scale-105"
      />
    }
    
    <!-- Sophisticated Badge -->
    <div class="absolute top-ds-2 left-ds-2">
      @if (hasDiscount) {
        <span class="badge badge-active !text-[9px] tracking-widest uppercase">
          -৳{{ discountAmount }}
        </span>
      }
    </div>
  </a>

  <!-- Content Area -->
  <div class="pt-ds-4 pb-ds-2 px-1 flex flex-col gap-ds-3 flex-1">
    <!-- Meta Info -->
    <div class="space-y-ds-1">
      <p class="text-[11px] font-bold uppercase tracking-widest text-ds-text-sec truncate">
        {{ product.name }}
      </p>
      <div class="flex items-center gap-ds-2">
        <h3 class="text-ds-lg font-bold text-ds-text leading-none">৳{{ currentPrice }}</h3>
        @if (hasDiscount) {
          <span class="text-ds-xs text-ds-text-muted line-through font-medium">৳{{ originalPrice }}</span>
        }
      </div>
    </div>

    <!-- Size Selector -->
    @if (availableSizes.length > 0) {
      <div class="flex flex-wrap gap-ds-1">
        @for (size of availableSizes; track size) {
          <button
            (click)="selectSize(size); $event.preventDefault(); $event.stopPropagation()"
            class="h-7 min-w-[2.5rem] px-1 flex items-center justify-center text-[10px] font-bold uppercase transition-all border rounded-sm"
            [ngClass]="{
              'bg-ds-accent border-ds-accent text-ds-hero-text': selectedSize === size,
              'bg-ds-bg border-ds-border text-ds-text-sec hover:border-ds-accent': selectedSize !== size
            }"
          >
            {{ size }}
          </button>
        }
      </div>
    }

    <!-- Actions -->
    <div class="mt-auto pt-ds-1">
      <div class="flex flex-col gap-ds-2">
        <button
          (click)="addToCart($event)"
          class="btn btn-secondary !min-h-[40px] !py-2 !text-[11px] tracking-widest uppercase"
        >
          {{ currentStock > 0 ? 'ADD TO CART' : 'PRE-ORDER' }}
        </button>
        <button
          (click)="orderNow($event)"
          class="btn btn-primary !min-h-[40px] !py-2 !text-[11px] tracking-widest uppercase"
        >
          {{ currentStock > 0 ? 'ORDER NOW' : 'PRE-ORDER NOW' }}
        </button>
      </div>
    </div>
  </div>

  <!-- Quick Add Modal -->
  @if (showQuickAdd) {
    <app-quick-add-modal
      [product]="$any(product)"
      [initialSize]="selectedSize"
      (close)="showQuickAdd = false; isOrdering = false"
      (added)="onQuickAddConfirm($event)"
    ></app-quick-add-modal>
  }
</div>
