<div class="flex flex-col items-center gap-4 pb-12">
  <h2
    class="text-ds-text"
  >
    {{ title }}
  </h2>
  <div class="w-12 h-px bg-ds-accent opacity-50"></div>
  @if (linkUrl) {
    <a
      class="text-ds-text-sec hover:text-ds-accent transition-colors flex items-center gap-2"
      [routerLink]="linkUrl"
    >
      {{ linkLabel || "Shop Collection" }}
      <app-icon name="ArrowRight" size="14"></app-icon>
    </a>
  }
</div>
