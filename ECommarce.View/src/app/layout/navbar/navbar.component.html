<header
  class="fixed z-50 w-full transition-all duration-300 bg-white/95 backdrop-blur-md border-b border-border-color"
  [ngClass]="{ 'py-1': isScrolled, 'py-2': !isScrolled }"
>
  <ng-container *ngIf="vm$ | async as vm">
    <div class="site-container">
      <!-- Row 1: Logo & Nav & Icons -->
      <div class="flex items-center justify-between h-12">
        <!-- Logo -->
        <a routerLink="/" class="flex-shrink-0 flex items-center group">
          <img
            [src]="
              vm.settings.logoUrl
                ? imageUrlService.getImageUrl(vm.settings.logoUrl!)
                : 'assets/logo.svg'
            "
            [alt]="vm.settings.websiteName || 'ArzaMart'"
            class="h-8 w-auto object-contain transition-transform duration-300 group-hover:scale-105"
          />
        </a>

        <!-- Center-Right: Navigation Links -->
        <div class="hidden lg:flex items-center gap-6 ml-auto mr-12">
          <ng-container *ngFor="let item of vm.menu">
            <a
              [routerLink]="['/category', item.slug]"
              class="text-[11px] font-bold uppercase tracking-wider text-primary hover:text-accent transition-colors cursor-pointer"
            >
              {{ item.name }}
            </a>
          </ng-container>
        </div>

        <!-- Far Right: Actions -->
        <div class="flex items-center gap-6 flex-shrink-0">
          <a routerLink="/offers" class="flex items-center gap-1.5 text-primary hover:text-accent transition-colors cursor-pointer group">
            <lucide-icon [img]="icons.Tag" class="w-4 h-4 text-primary/40 group-hover:text-accent transition-colors"></lucide-icon>
            <span class="text-[11px] font-bold uppercase tracking-wider hidden sm:inline">Offer</span>
          </a>
          
          <a routerLink="/cart" class="relative group p-1 text-primary hover:text-accent transition-all duration-300 cursor-pointer">
            <lucide-icon [img]="icons.ShoppingBag" class="w-5 h-5 stroke-[2]"></lucide-icon>
            <span
              *ngIf="vm.cartCount > 0"
              class="absolute -top-1 -right-1 h-4 w-4 bg-accent text-white text-[9px] font-black rounded-full flex items-center justify-center shadow-lg transform group-hover:scale-110 transition-transform"
            >
              {{ vm.cartCount }}
            </span>
          </a>

          <a routerLink="/profile" class="text-primary hover:text-accent transition-all duration-300 cursor-pointer p-1">
            <lucide-icon [img]="icons.User" class="w-5 h-5 stroke-[2]"></lucide-icon>
          </a>

          <!-- Mobile Toggle -->
          <button (click)="toggleMenu()" class="lg:hidden p-1 text-text-sub hover:text-primary transition-colors">
            <lucide-icon [img]="isMenuOpen ? icons.X : icons.Menu" class="w-6 h-6"></lucide-icon>
          </button>
        </div>
      </div>

      <!-- Row 2: Search & Categories -->
      <div class="flex items-center gap-4 py-2 border-t border-supporting bg-white lg:flex-row flex-col">
        <!-- Categories Dropdown Button -->
        <div class="relative w-full lg:w-64">
          <button
            (click)="toggleCategoriesMenu()"
            class="w-full flex items-center justify-between gap-3 px-4 py-2 bg-supporting/40 hover:bg-supporting/60 border border-border-color rounded-lg text-[10px] font-bold text-text-main transition-all duration-300 group"
          >
            <div class="flex items-center gap-2 md:gap-3">
              <lucide-icon [img]="icons.Menu" class="w-4 h-4 text-primary group-hover:rotate-180 transition-transform duration-500"></lucide-icon>
              <span class="uppercase tracking-[0.1em]">All Categories</span>
            </div>
            <lucide-icon [img]="icons.ChevronDown" class="w-4 h-4 opacity-40 transition-transform duration-300" [class.rotate-180]="isCategoriesMenuOpen"></lucide-icon>
          </button>

          <!-- Categories Dropdown (Elegant Minimalist) -->
          <div
            *ngIf="isCategoriesMenuOpen"
            class="absolute top-full left-0 w-full mt-2 bg-white border border-border-color shadow-2xl rounded-2xl p-4 grid grid-cols-1 gap-1 z-[60] animate-fade-in-up origin-top"
          >
             <a
              *ngFor="let item of vm.menu"
              [routerLink]="['/category', item.slug]"
              (click)="isCategoriesMenuOpen = false"
              class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-semibold text-text-sub hover:text-primary hover:bg-primary/5 transition-all duration-200"
            >
              {{ item.name }}
            </a>
          </div>
        </div>

        <!-- Search Bar -->
        <div class="relative flex-1 w-full">
          <div class="relative flex items-center">
            <input
              type="text"
              [(ngModel)]="searchQuery"
              (keyup.enter)="onSearch()"
              placeholder="Search for products..."
              class="w-full h-10 pl-5 pr-12 bg-supporting/40 border border-border-color rounded-lg text-sm text-text-main placeholder:text-gray-400 focus:ring-2 focus:ring-primary/10 focus:border-primary/20 focus:bg-white transition-all duration-300"
            />
            <button
              (click)="onSearch()"
              class="absolute right-2 px-4 py-2 bg-white text-gray-400 hover:text-primary transition-all duration-300"
            >
              <lucide-icon [img]="icons.Search" class="w-5 h-5 stroke-[2.5]"></lucide-icon>
            </button>
          </div>
        </div>
      </div>
    </div>
  </ng-container>
</header>

<!-- Spacer to push content below fixed navbar -->
<div class="h-24 lg:h-28"></div>

<!-- Mobile Navigation Overlay (Refined) -->
<div
  *ngIf="isMenuOpen"
  class="lg:hidden fixed inset-0 z-[100] bg-white pt-24 px-6 overflow-y-auto animate-fade-in"
>
  <div class="flex justify-between items-center mb-8">
     <img src="assets/logo.svg" class="h-8 w-auto" alt="Logo" />
     <button (click)="closeMenu()" class="p-2 bg-gray-50 rounded-full"><lucide-icon [img]="icons.X" class="w-5 h-5"></lucide-icon></button>
  </div>
  <nav class="flex flex-col gap-1">
    <ng-container *ngIf="vm$ | async as vm">
        <a 
            *ngFor="let item of vm.menu"
            [routerLink]="['/category', item.slug]"
            (click)="closeMenu()"
            class="py-4 border-b border-gray-50 text-sm font-bold uppercase tracking-widest text-text-main hover:text-primary transition-colors"
        >
            {{ item.name }}
        </a>
    </ng-container>
  </nav>
</div>
