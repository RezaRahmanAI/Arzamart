<main class="site-container py-ds-10 flex flex-1 flex-col">
  <app-men-breadcrumbs></app-men-breadcrumbs>
  
  <div class="mb-ds-12 flex flex-col justify-between gap-ds-6 md:flex-row md:items-end">
    <div class="max-w-2xl space-y-ds-3">
      <h2 class="section-title">Men's Collection</h2>
      <p class="text-ds-lg text-ds-text-sec font-medium leading-relaxed">
        Modern elegance meets classic comfort. Explore our curated selection of contemporary essentials.
      </p>
    </div>
  </div>

  <div class="flex flex-col gap-ds-10 lg:flex-row">
    <!-- Filters & Sidebar could be added here if needed, following Women's pattern -->
    <div class="flex-1 space-y-ds-8">
      <app-men-filters-sortbar [shownProducts]="products.length" [totalProducts]="products.length"></app-men-filters-sortbar>
      <app-men-product-grid></app-men-product-grid>
      <app-men-pagination></app-men-pagination>
    </div>
  </div>
</main>
