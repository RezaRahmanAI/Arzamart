<section class="py-ds-16 md:py-ds-20 lg:py-ds-24 bg-ds-bg" *ngIf="promoBanner$ | async as banner">
  <div class="site-container">
    <div class="mx-auto">
      <div
        class="relative overflow-hidden min-h-[300px] sm:min-h-[400px] md:min-h-[500px] flex items-center bg-ds-accent border border-ds-border"
      >
        <div
          class="absolute inset-0 bg-cover bg-center opacity-30 grayscale transition-transform duration-[3000ms] hover:scale-110"
          [style.background-image]="'url(' + imageUrlService.getImageUrl(banner.imageUrl) + ')'"
        ></div>
        <div class="relative z-10 p-ds-8 md:p-ds-16 lg:p-ds-24 max-w-lg md:max-w-2xl text-ds-hero-text">
          <span
            class="text-ds-hero-text/70 font-bold tracking-[0.4em] text-[10px] uppercase mb-ds-6 block"
            >{{ banner.subtitle }}</span
          >
          <h2
            class="text-ds-4xl md:text-ds-5xl lg:text-ds-6xl font-bold uppercase mb-ds-8 leading-none tracking-tighter"
          >
            {{ banner.title }}
          </h2>
          <p
            class="text-ds-hero-text/80 text-[11px] md:text-ds-sm mb-ds-10 leading-relaxed uppercase tracking-[0.2em] font-medium max-w-md"
          >
            Discover exclusive collections curated for the discerning eye.
          </p>
          <a
            routerLink="/products"
            class="btn btn-secondary h-14 !text-[11px] !tracking-[0.3em] uppercase !w-auto !px-ds-12 !bg-white/10 !text-white !border-white/20 hover:!bg-white hover:!text-ds-accent transition-all duration-base"
          >
            {{ banner.buttonText || 'Explore Offers' }}
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
