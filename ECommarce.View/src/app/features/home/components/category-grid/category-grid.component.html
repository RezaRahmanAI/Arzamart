<section class="bg-ds-bg py-ds-20 lg:py-ds-32">
  <div class="site-container">
    <!-- Section Header -->
    <div class="flex flex-col md:flex-row justify-between items-end mb-ds-16">
      <div class="space-y-ds-4">
        <span class="block text-[10px] uppercase tracking-[0.4em] font-bold text-ds-text-muted">
          Curated Collections
        </span>
        <h2 class="text-ds-4xl md:text-ds-5xl font-serif italic text-ds-text leading-none uppercase">
          Explore by Category
        </h2>
      </div>
      <a
        routerLink="/shop"
        class="hidden md:inline-flex items-center gap-ds-2 text-[10px] uppercase tracking-[0.2em] font-bold border-b border-ds-text pb-1 hover:text-ds-accent hover:border-transparent transition-all duration-base"
      >
        View All Collections
      </a>
    </div>

    <!-- Bento Grid -->
    <div class="grid grid-cols-1 md:grid-cols-12 gap-ds-4 md:gap-ds-6 h-auto md:h-[900px]">
      <ng-container *ngFor="let category of categories; let i = index">
        <a
          [routerLink]="category.href"
          class="group relative overflow-hidden block w-full h-[400px] md:h-auto border border-ds-border"
          [ngClass]="{
            'md:col-span-6 md:row-span-2': i === 0,
            'md:col-span-3 md:row-span-1': i >= 1 && i <= 4,
          }"
          *ngIf="i < 5"
        >
          <!-- Image -->
          <div
            class="absolute inset-0 bg-cover bg-center transition-transform duration-[1500ms] ease-out group-hover:scale-105"
            [style.backgroundImage]="'url(' + imageUrlService.getImageUrl(category.imageUrl) + ')'"
          ></div>

          <!-- Gradient Overlay -->
          <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-60 group-hover:opacity-80 transition-opacity duration-700"></div>

          <!-- Content -->
          <div class="absolute inset-0 flex flex-col justify-end p-ds-8 md:p-ds-12">
            <div class="transform translate-y-4 group-hover:translate-y-0 transition-all duration-700">
              <h3 class="text-white text-ds-2xl md:text-ds-3xl font-bold uppercase tracking-tight mb-ds-2">
                {{ category.name }}
              </h3>
              <span class="inline-flex items-center gap-ds-3 text-[10px] uppercase tracking-[0.3em] text-white/80 font-bold opacity-0 group-hover:opacity-100 transition-all duration-700 delay-100">
                Explore Now
                <app-icon name="ArrowRight" size="16"></app-icon>
              </span>
            </div>
          </div>
        </a>
      </ng-container>
    </div>
  </div>
</section>
