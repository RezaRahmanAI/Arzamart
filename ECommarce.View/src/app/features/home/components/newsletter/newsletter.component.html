<section class="py-ds-16 md:py-ds-20 lg:py-ds-24 bg-ds-surface border-y border-ds-border" *ngIf="settings$ | async as settings">
  <div class="site-container">
    <div class="mx-auto text-center flex flex-col items-center gap-ds-12">
      <div class="mx-auto flex flex-col items-center space-y-ds-6">
        <span class="text-ds-accent block">
          The Insider
        </span>
        <h2 class="text-ds-text">
          Join the refined world<br />of {{ settings.websiteName || "Arza Mart" }}
        </h2>
        <p class="text-ds-text-sec opacity-80 max-w-lg">
          {{
            settings.description ||
              "Receive exclusive updates on new collections, limited releases, and refined products."
          }}
        </p>
      </div>

      <form class="flex w-full flex-col sm:flex-row gap-ds-8 mt-ds-4 max-w-xl group">
        <div class="flex-1 relative">
          <input
            class="w-full h-14 bg-transparent border-0 border-b border-ds-border px-0 focus:ring-0 focus:border-ds-accent text-ds-text placeholder:text-ds-text-muted transition-all duration-300"
            placeholder="E-MAIL ADDRESS"
            required
            type="email"
          />
        </div>
        <button
          class="btn btn-primary h-14 px-ds-12"
          type="submit"
        >
          Subscribe
        </button>
      </form>

      <p class="text-ds-text-muted">
        By joining, you agree to our refined policies.
      </p>
    </div>
  </div>
</section>
