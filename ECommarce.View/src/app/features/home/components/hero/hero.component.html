<section class="site-container py-6">
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-5 h-[500px]">
    <div class="lg:col-span-8 bg-supporting rounded-3xl relative overflow-hidden">
      @if (mainSlides.length > 0) {
        @let slide = mainSlides[currentSlide];
        <div class="absolute inset-0 bg-cover bg-center" [style.background-image]="'url(' + imageUrlService.getImageUrl(slide.image) + ')'"></div>
        <div class="relative h-full flex flex-col justify-center p-12 text-white bg-black/20">
          <h1 class="text-5xl font-black mb-4">{{ slide.title }}</h1>
          <p class="mb-8 max-w-md">{{ slide.subtitle }}</p>
          <a [routerLink]="slide.link" class="bg-primary px-8 py-3 rounded-full w-fit font-bold">Shop Now</a>
        </div>

        <!-- Progress Bar -->
        <div class="absolute bottom-0 left-0 w-full h-1 bg-black/10 z-20">
          <div
            class="h-full bg-white transition-all duration-75"
            [style.width.%]="slideProgress"
          ></div>
        </div>
      }
    </div>
    <div class="lg:col-span-4 bg-primary rounded-3xl relative overflow-hidden flex flex-col justify-center p-8 text-white">
      @if (spotlightSlide) {
        <div class="absolute inset-0 bg-cover bg-center opacity-60" [style.background-image]="'url(' + imageUrlService.getImageUrl(spotlightSlide.image) + ')'"></div>
        <div class="relative z-10">
          @if (spotlightSlide.subtitle) {
            <span class="text-accent font-bold text-xs uppercase tracking-widest mb-2 block">{{ spotlightSlide.subtitle }}</span>
          }
          <h3 class="text-3xl font-black mb-4 leading-tight">{{ spotlightSlide.title }}</h3>
          <a [routerLink]="spotlightSlide.link" class="bg-white text-primary px-6 py-2.5 rounded-lg w-fit font-bold mt-2 inline-block hover:bg-accent hover:text-white transition-colors">
            {{ spotlightSlide.linkText || 'Shop Now' }}
          </a>
        </div>
      }
    </div>
  </div>
</section>
