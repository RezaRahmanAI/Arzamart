<section class="section-py bg-ds-bg">
  <div class="site-container">
    <div class="flex flex-col items-center mb-ds-10 lg:mb-ds-16 text-center space-y-ds-2">
      <span class="text-ds-xs uppercase tracking-[0.3em] text-ds-text-sec font-bold block">Selected for You</span>
      <h2 class="section-title">Featured Collection</h2>
      <div class="w-12 h-[1.5px] bg-ds-accent mt-ds-4"></div>
    </div>
    
    <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-ds-4 lg:gap-ds-8">
      @for (product of products; track product.id) {
        <app-product-card [product]="product"></app-product-card>
      }
    </div>
  </div>
</section>
