<aside class="w-full shrink-0">
  <div class="sticky top-28 space-y-ds-12">
    <div>
      <h3 class="mb-ds-6 text-ds-text">Categories</h3>
      <ul class="space-y-ds-4 text-ds-text-sec">
        <li *ngFor="let category of categoryCounts">
          <a
            class="flex items-center justify-between group transition-colors"
            [ngClass]="category.highlight ? 'text-ds-text' : 'hover:text-ds-text'"
            href="#"
          >
            <span>{{ category.label }}</span>
            <span class="text-ds-text-muted opacity-50 group-hover:opacity-100 transition-opacity">({{ category.count }})</span>
          </a>
        </li>
      </ul>
    </div>
    
    <div class="h-[1px] bg-ds-border/50"></div>
    
    <div>
      <h3 class="mb-ds-6 text-ds-text">Size</h3>
      <div class="grid grid-cols-3 gap-ds-2">
        <button 
          *ngFor="let s of ['XS', 'S', 'M', 'L', 'XL', 'XXL']"
          [class]="s === 'M' ? 'bg-ds-text text-ds-bg border-ds-text' : 'bg-ds-bg text-ds-text-sec border-ds-border hover:border-ds-text'"
          class="flex h-10 items-center justify-center border transition-all"
        >
          {{ s }}
        </button>
      </div>
    </div>
  </div>
</aside>
